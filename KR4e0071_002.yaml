body:
  text: 繼志齋集卷二眀王紳撰五言古體詩夜坐呈正學方先生闕簷傍流水栁巷夾荒堤燈火川上眀日落行人稀勝遊固足樂荒亡古所譏題菜紛紛桃與李默默自成蹊繁花一消歇寂寞無人知孰若春園蔬生長在中畦至味存淡泊疏葉發華滋彼哉膏粱子但慕羶與肥不得此中趣百事安能為原希命飲分韻得園字才庸困官職志僻厭煩喧今日適公暇遂爾叩衡門之子喜我至日夕羅盤飱江鱗入初饌簷花照清尊酒酣句益豪情投語自溫顧此二三友夙昔道義存及此成嘉會歡樂難具論眀河橫碧落疏鐸響城垣長嘯靈籟發皓月臨東園留宋子夷夜飲分韻得重字浮雲翳原隰朔風號仲冬故人百里來握手一笑同豈惟會晤難感此契誼濃情真飲逾量不知尊缶空人生在行樂無為苦匆匆眀日灌陽道雲山千萬重送鄒公瑾赴京滔滔大江水晝夜流無窮飄飄太空雲來往何定蹤雲出須致雨水流擬朝宗雲水亦何心物理自爾同媺人事真修業成譽彌隆譬彼瑚與璉合致清廟庸又若丹穴雛飛鳴際時雍今晨錦江上征帆飽西風執手不忍别離憂益忡忡陽回梅吐萼雪消山露峰盛年幸未艾令德須更崇養鋭在西蜀發軔從古渝慷慨抱長策奮振登雲衢飽學期致用負才任所需丈夫弧矢志毋為事區區冬深江水落灔澦成坦途孤舟下如駛指日瞻皇都皇都英彥藪列肆羅璠璵廟堂重稷契閭巷歌唐虞年來益求賢行矣勿躊躇但當勵崇節善此千金軀送史行可先生赴考宦遊三十年卑顯遍揚厯起家自東南祿食諳西北豈無桃與李繁華隨候易惟彼後凋姿不改嵗寒色保身匪無計存心任坦直儉約苦清修謹厚效玄默自我客西川邂逅遂良覿歡然竟忘年傾倒談在昔慨想冰雪心浩懷風雨夕亦欲長相親栖栖縛形役朅來錦江上重逢懷抱釋既續梁園賦每前賈生席啓沃協睿情諏咨動移刻如何嵗云暮束裝上京國贊畫謀猷多用夏變夷貊政成與計偕奈此簡書逼雲橫棧道髙雪擁劒門窄萬里足翶翔乘風搏巨翼送胡仲長分韻得遊字當今逢掖徒正學稱冕旒及門二三子孰為夏與遊英英古榮彥文彩珊瑚鈎又若九苞雛不與雞鶩儔江城嵗華晏朔風襲重裘陟岵復陟屺凄然翻百憂扣門來别我執袂不可留相送出崇墉攬轡心悠悠烏鳥啼逺林白雲被荒丘物情固所感正學宜繼修題周子良梅谷季冬天氣肅百卉具巳腓靈根先太極侵寒自芳菲蹇蹇鐵石操皎皎冰雪姿疏花散空谷嵗晚疇能知幽人謝紛華託以同襟期影斜蒼澗側香度黃昏時邈哉逋仙子悵焉起遐思同袁公弼飲吳邦輔家初陽布輕燠羣卉擢新芳良辰屬嘉會煩囂滌中腸慨我二三友出處各異方遂合孰使然萃此君子堂珠璣溢篇帙肴核間壺觴情真飲逾量話洽心兩忘東鄰陳綺筵珍羞燦輝光西舍列吳謳徽聲繞高梁豈知侈心蕩歡樂殊易央何如文字飲淡泊趣味長題畫菜畦蔬有嘉種更藉雨露恩緑葉發華滋足可供盤飱伊誰慕清修志欲茹其根於焉寫幽貞宛宛生意存夏日懷敬直先生天氣屬清和幽齋淨於水端居仰聖眀俯探玄化理浮雲馳逺郊重隂蔭書几好鳥弄佳音間花發竒卉蕭散有餘清煩襟蕩塵滓比鄰有幽人相去不尺咫論心膠在漆談道宫協徴信宿不相逢離憂騁如駛大音本希聲髙懷曠知已斯文幸可徴殷勤望之子送虞升善回京江梅遞清馨山雪照行色把酒錦江濆言送青雲客之子名賢孫早登君子門淵源既有自德業難具論朅來奉朝命萬里行西蜀簡閲厯邉城計偕厪案牘今晨來告别握手不忍分匪為話别難亦欲致殷勤丈夫平生學惟存忠與孝二者百行源芳名簡編照夏夜同劉仲美讀正學方先生文良宵塵事寂好月升前楹庭卉薦芳細松風入懷清故人百里來一見雙眼眀呼童具雞黍濁醪聊對傾山南文章伯雄論神鬼驚一自鈞天奏屏縮嘈唽鳴挑燈謾披閲口誦兼手謄煩襟頓蠲滌鄙吝無由生信知斯文妙能起薄俗情酒酣共欣賞疑義釋春冰夜坐書懷簡仲美弱齡志問學屏慮息衆營道逺力駑下潦倒終無成摛辭希往哲談經對諸生谷空靈籟應候至悲蟲鳴感物成內省俯仰慚愧并故人適逺至使我懷抱傾薰風起修竹微雨灑疏櫺悠然領斯趣新暑隨時清步屧頽簷下笑談到深更豈徒今夕樂庶得千古情贈夏醫士灌陽有佳士迥與凡俗異擇術非自謀存心在濟利袖攜長生訣日啓軒岐祕表裏察隂陽刀圭起痼滯采苓岷山顛洗术灌水澨生理不妄營存耕有餘地橘井秋香清杏林春色媚往軌倘可逐髙風願君繼懷鄭叔度二首人生水上萍往來無定根會合既難常有懷嘗苦辛髙人美風裁育質孝義門溫溫富文學籍籍佳弟昆摛辭擷春葩抗志凌秋旻憶忝籍湜好切磋義彌惇夜踏麟溪月曉卧蘿山雲年來事分攜欲見邈無因長風蕩天末流水行逺津吳蜀隔萬里矯首嗟離羣塵事汨清興擾擾無己時偶兹休沐日暢焉起遐思骨肉日以逺故舊日己稀為學若望洋年華去如馳開嵗倐四十頗覺前事非玄髮己半改芳顔亦就頽歎此時序邁青春不再來日夕秉眀燭酌我杯中醨呼兒具紙筆細寫停雲詩出郭言懷經時不出郭出郭多佳趣按轡故徐行庶以滌吾慮農唱發前村人家隱深樹溪流縈復折揭涉不辭屢忽驚白鷺起逺向青山去人生貴佳適是非安足預即景動遐思故山渺何處讀李御史文藁栝蒼鬱嵳峩上與浮雲齊秀氣之所鍾每生超卓姿媺人抱奇才造就從碩師新詩追少陵雄文逐昌黎鳳鳥鳴髙岡祥物由來稀幸兹文眀世拭目一見之渴吻沃瓊液虛腹餐虀芝豈惟過所望體腋生光輝蜀道走驄馬夷民瞻繡衣邉情重當恤願言謹諏咨病中述懷抱疢頽簷下嗒然徒自傷飢或恣所食熱或解我裳但適一時快豈顧今日殃至人謹天和動息皆有常保疾如保嬰肯使邪沴戕嗟豫昧所守從欲不知防淹淹百病侵坐使鬚髮蒼一身自弗理欲恃藥石良茍居廟堂上曷致斯民康别成都諸友竊祿居成都妨賢心獨恥徴書天上來詔許歸帝里倉皇不俟駕惕惕戒行李雖無懷土情寧不念知巳雄藩衆朋舊一一皆佳士出餞錦江湄芳情藹如醴話言始云洽吾事適有指方舟解維去咫尺川原異雲山杳茫茫契闊慨今始相期豈無言令德在惇美送鄭叔貞從駕巡邉三首時雨沐芳甸林木薦南薰賢王肅命駕廣道先清塵奔走給衆役呵護勞百神山川本自嘉徼塞須逺巡前驅盡褒鄂旁侍皆白申豈惟耀威武亦欲昭至仁馳驅匪云邈屬車無停輪遙遙盼紅雲擬候廣漢濵鸞輿屬巡幸奔走紛俊乂川光照征袍隰雲擁飛騎鄭子山澤癯逺自東海至許令沐清光執筆同近侍原野民物饒夷貊風俗異遊豫昭王度紀述擅才氣寸善且不遺至德在詳記洗耳錦江濵好音為頻寄子長好逺遊為文時出奇子美遍涉厯窮達皆寓詩斯文千載事藉此清淑資羡子有深緣遭遇天人知薰陶飫令德遊覽逢盛時坐使補衮手抽出獨繭絲蹇豫類斥鷃卑卑守茅茨安得凌風翼與之相追隨初度時序倐云邁隙駒快先馳四十在眼前回首百事非學術無寸進宦業亦何卑齒牙半衰豁種髮或染絲長恐成濩落老大無補裨朝夕惕以厲尚恨駑且疲晨興對東旻再拜雙淚滋誓言毋愧怍樹德以為期簡實即中法師步屧西郭門炎埃集絺服夜投古招提共假禪房宿上人海上來清姿揭梧竹玄通道眼眀悟徹機鋒速內典既已充外學亦何足宗門二三老延頸深期屬交誼薄煙雲贈言藹珠玉一見雙眼青相知恨不夙問德識淵源論文究衷曲燈花吐清輝庭草薦新馥未結三生緣淡然念超俗闕題以下原闕難常嘉會良足記簡鄭叔貞前年抵西川今年發東越萬里豈不遙﨑嶇勞跋涉關河足遊覽襟懷益軒豁雄文竟何如我目日以刮當寧久虛懷求賢若飢渴蜀道諒已諳重來馬蹄滑壯遊當及時無為待華髮擬踏浣溪雲共看岷峨月嘉猷以詩言志故亦本豫志以答之憶昔盍簮日念子思有為投筆長歎息慨然賦新詩鴻鵠千里志浩浩不可羇況當盛眀世翺翔政其時自慙鷦鷯質栖栖戀茅茨豈不欲髙邁眀命那忍違錦江春色暮和風入羅衣援瑟鼓復作尚嘆知音稀送正學方先生交久情自篤道同誼彌深豈曰足可取偶契賢哲心樗朴産深谷莫為斤斧尋誤蒙匠石睨價比南州金鈞天絶遺響竽籟競哇淫孰識爨下質乃是稀世音物理固則然天命良足諶握手岐路側慨然發長吟和鄒公瑾留别二首新陽被芳甸輕暑却餘寒時序有代謝形役何足歎縱浪比雲萍總囿大化間茍能篤情好意氣增巍山憶在渝水側握手成交歡乍離忽復合嗜好同醎酸幾回憑尺素寫此鐵石肝千里固匪遙心在會豈難有美蓬萊侣玉質何溫其瓊琚以為佩雲霞以為衣翩然駕白鶴悵望將焉之岷山奇復髙渝水清且漪相望不咫尺何由共襟期佳音比金玉遺我可解頥舟次瞿塘江空風力遒秋氣日已肅扁舟事東邁夜泊瞿塘宿先師太史公文章燦珠玉孤忠日月眀素行金石篤共談遭逢盛詎云基謗讟豈特黔戎行終成沅湘逐孤墳寓江濵培然欺豎牧宿草被荒阡寒煙迷拱木絮酒不忍奠拈辭詎堪讀矯首睇太蒼何以盡衷曲吾皇天地仁德澤沛膏沐朽骨倘蒙恩當期不逺復入峽世傳三峽險吾身適屢往蕩舟趨洄流驚濤漾輕槳巑峯開復合青天細如掌浪急先期程谷空答漁響回顧上瀨人吾行若平壤日夕下夷陵祝酒相欣賞送鼎上人還鄉青原有名緇戒行極嚴具一葦航大江飄飄隨所寓十月天雨霜木落林姿露翩然逸興發長歌賦歸去杖錫輕波濤袈裟入煙霧月照祇樹西相思渺何處題終養堂散步出平陸烏鳥啼北林矯首睇寥廓白雲飛逺岑感物易傷懷惕惕孝子心嚴親不待養嵗月何駸駸幸有堂上母亦已桑榆侵奉觴介眉夀春酒隨候斟亦有忘憂草樹之髙堂隂謂山固非髙謂海亦何深但願遂終養仰止損與參題去思亭卷民情本無事帖然靜於水順性以道之自能臻至理縱觀古循吏視民如赤子既去人見思芳名藹青史籍籍金郡侯存心多豈弟持節鎮全閩剖符當帝里既敷延夀化且洽信臣治仁政方下孚宿瘼已如洗胡為北堂萱夜逐秋霜萎蓼莪遽興哀歸心疾於矢攀轅竟何為卧轍諒難止載歌甘棠詩庶以著侯美寄宗思睿朱子建虛名被洪恩一官授國博才華非所任廩秩殊不薄抱經適玄妙志道忘淡泊朝對鍾阜雲夜聽石城柝懷人千里外惸然歎離索豈無停雲詩欲寫情思惡英英默齋翁閎論抗寥廓矯矯丹溪英雄文擅述作參商忽三載髙誼諒如昨何時華川湄從容手重握寄昂伏菴禪師弱齡厭喧囂雅志尚玄默胡為中年來奔走倦形役一自服官針出入不遑息雞鳴走風雨旅食困朝夕山中有髙人端居縳禪寂冥觀萬物表幽情寓泉石道機既云熟真源諒應滌不為塵鞅羈但恐坐詩癖話别華川湄寒暑忽屢易觀想三生緣寧念紅塵客送睢州陳知州之任嵗晏霜雪零揚帆入煙霧赤手綰銅章逺向睢州去赫赫張許忠耿耿晏劉譽人逺迹可尋莫嘆來何暮東郭草堂為姑蘇王仲逺賦草堂三兩間去郭十里餘門栽陶令栁架插鄴侯書漁樵足生計琴樽供晚娛未知杜陵宅風致更何如稽古齋為晏彥文助教賦麟原有幽齋蕭然僅環堵疇其托真栖於焉號稽古鴻荒世已逺羲軒邈難覩至治論唐虞斯道集鄒魯人文既已開脈脈埀微緒不有博洽功精妙何能舉若人元獻裔家學紹伊祖搜羅極玄賾注述昭天序韋編窮嵗月青燈坐風雨但知卷中趣寧辭我心苦尚友惟聖賢騁懷隘寰宇坐此固非癖靈臺淡容與寄叔盛叔雍叔敘諸姪余宗本名門厯年逾五百家世篤忠貞奕葉傳清白大父常山公舉代稱儒宗厥生子三人衍慶流無窮伯也實乃祖季也為叔父出處雖不齊辛勤植門户仲即我嚴君力學貫天人斯文紹前哲盛名天下聞余生蹇且劣髫年失怙恃蓼莪重興哀風木感劬瘁間關四十載無術周其身黽勉緝先業縷髮懸千鈞朅來被虛名萬里宦川蜀一官未云滿又竊太學祿太學賢俊關襟珮何珊珊李桓既雜遝陳杜相後先自從塵師席強顔僚寀後但恐賢路妨虀鹽甘所受敝裘雪霜裏孤燈風雨中芳顔日凋謝老醜形青銅故山渺東浙無由賦歸去骨肉不在眼夢寐常相晤昨朝鄉人來語我消息真喜汝兄及弟幸與詩書親富貴果何物有隆還有替譬若風中花時去即憔悴惟有積善者不啻日晷長雖然猝難見後嗣綿綿昌我願汝等賢背惡力趍善立德須象先行道毋憚逺橋門適公退掩關綴新詩話言固覼縷庶寫長相思寄幻泊上人束髮弄文翰鞠眀仍究曛汨此塵俗囂至道殊未聞凡緣如蝟毛擾擾集幻身疇能超物表悠然樂清真夜對靈谷月曉踏長干雲所思在咫尺可望不可親孤懷日已委一見自足陳終當重相過共説無生因簡無為張真人昔在旃蒙嵗曽作清都遊尋幽探祕窟采真訪仙儔徜徉南華館宿留耆山陬話語幸相洽契誼殊已投既下陳公榻又買潯陽舟别來忽三載萍迹等浮漚聖皇啓文運萬國朝冕旒雙鳬忽來集劒影輝斗牛握手烏衣巷騁目白鷺洲重逢動深慨情意何綢繆題墨竹娟娟盈尺素誰寫凌雲姿長梢拂霄漢羣鳳來參差坡仙久已往湖州不復追髙公有清致醉墨何淋漓送匡廷憲僉事之任閩中靈雨下神皋春意溢皇都有客獨持斧出蒞閩粵區繡衣炫晴旭驄馬馳逺途行矣勿遲留疲癃望來蘇陪衍聖公宴集用鄭助教韻名教心夙歆束髮知所宗鑽瞻慨才劣出處欣時雍載惟素王道萬古天日崇欲語諒難名蕩蕩宇宙充眷兹神眀胄執德全天衷由來服庭訓髣佛良且恭橋門多士集華宴一笑同倡賡託神契酬酢熙春融願言極兹樂嘉會難屢逢送磐石張先生還蜀身居學省中心馳千萬里存養豈無方所念在知已憶與子托交情親若兄弟一旦成睽違此懷何日已浮雲起半山隂停鳳臺趾於我豈無關見之良足喜山川極悠邈日月迅流晷努力赴修程去住各有指目送隔崇墉攬涕不能止人生大化內離合固難擬雲萍會有期皓首以為俟送司業張先生代祀宣聖聖皇嗣丕祚舉禮秩無文幽眀既肸蠁大小齊駿奔況兹曲阜宅巍巍闕里尊神靈儼斯萃于焉致眀禋肅將豈無人顧屬耆德臣精誠冀有托達此皇意惇軺車戒逺道宴餞及良辰雲山渺東魯歸途春正殷和髙學士賀慶成詩二十韻鳳厯啓文運天心眷皇眀聖人嗣宸極君子揚王庭深仁被八埏至德浹羣生民情盡敷洽穹厚埀休徴稽文舉殷禮遍秩及百靈胞翟且顒若小大懷至誠瑟彼瓉實鬯苾矣黍在盛綴兆萬舞舉抑按簫韶鳴濛鴻感肸蠁葳蕤絢光晶灌注既下格焄蒿隨上升維時夜初午斗柄中天橫令儀雍且肅睿情悅以寧孰謂神道逺孚假如應聲雲軿倐回馭鑾輿亦旋旌駿奔百辟走慶成列千卿祥煙擁仙仗天香靄餘馨侃侃玉堂仙當代稱才能顯相秉眀德有事斯為榮倡酬紀盛典撝抑如不勝蕪詞謾貂續願言祝皇齡竹窗小隱為羽士孔德容賦嘉種分淇澳靈根育清都子孫既繁衍枝葉何紛敷羽人抱髙志淡泊宗玄虛開窗翠靄入展席晴雲舒晝間寂無事寶篆銷金爐手持長生訣心味靈筌書清風滿廣座眀月來鳳雛何時解羈鞅一造雲巢居春暉堂為吳興魏辨作勾芒一司令旭日眀初陽沖融著大凷昭蘇被羣芳仰惟亭毒意化育固其常洪纎囿機巧厥德何洋洋東吳有孝子慈親夀且康白髮被兩鬢報答慙無方喜懼激衷懷春暉署髙堂持此寸草心偃仰存羮牆柏臺餘思為陸廣平御史作柏臺有君子衷懷孰能知朝伸澄清志夕起追慕思所思何以見感此柏上烏烏雛未能飛烏母每哺之一朝雛逺舉返哺答母慈人生亦奚為成此長别離嚴親掩重泉欲見杳無期尚幸有阿祖逺在天一涯得祿弗得養痛此烏不如聞之重豫感泫然雙淚埀作詩寫子悲于焉寄吾私重慶堂為廖以成作西川廖氏子樂育居成均口言重慶事積善由其門阿翁已見曽其子亦抱孫一堂萃四老油然樂天倫白髮照先後斑衣舞逡巡譬彼凌雲木厥盛由本根又若大江水其流自淵源廖氏集繁祉積纍既有因作詩紀斯美庶勸薄俗敦繼志齋集卷二
