body:
  text: 繼志齊集卷三眀王紳撰五言古體詩送王元采大尹之漢陽闕皇崇孝理立愛方自躬聞之重埀憫伸恩全至公精誠帝心格孝悌神眀通作詩紀其實庶以昭無窮和韋蘇州韻送潘德囦客行有程期持觴不復待引領望天台解維發淮海杳杳雲樹蒼悠悠嵗時改願子勿遲留髙堂華髮在送劉虞歸省扁舟乘天風冉冉衝烟霧朝坐龍江發夕向牛渚去壯遊屬眀時故人渺何處髙堂鶴髮新遲子慰衰暮送王仲修念子逺行邁匆匆不復住短槳蕩風濤孤帆眇烟樹行色波上鷗歸思風中絮矯首感深恩成都在何處會友軒為朱顯忠千户作投戈幸無事盛時多宴閒軒居謝塵俗下榻延儒冠日夕衆賔集剪燭春夜闌知已總雲萍同臭紛芝蘭人生貴有適油油足清歡但得簮常盍肯使樽中乾倉庚鳴牖外白鷗泛波間支頤玩羣動相期盟嵗寒送吕貴行還會稽平生栖遁志逍遙聊自足胡為中年來馳驅遍原陸王事亦靡盬青春去不復衰病忽已侵詣闕陳衷曲有詔許歸休翩然返初服三徑迹未荒一身計堪卜田園成日涉桑麻長新緑藹藹逺塵紛欣欣遇童僕春雨膏石田秋風被茅屋林塘足佳趣何須羡盤谷贈紫陽周羽士我家在金華居近赤松側赤松有山人云是蓬壺客服食惟紫霞叱咤起白石至今千載下在在存遺迹春暮桃源深天空海雲碧幾欲叩其門奈此塵凡隔飄颻紫陽生靈臺湛虛寂彈指驚鬼神妙用麾霹靂滄洲與赤城乘鸞恣遊適真侣會因逢煩君致吾臆兹䝉聖恩追録先德當贈誥渙頒之日適余生初度之辰悲喜交中輒形咏嘆是用録呈同志共作榮觀弱齡志家學黽勉事討論顯揚恨無術惻惻長抱辛今嵗倐四十劬勞在兹辰寵光適下賁沛及沒與存易名錫美諡贈誥頒紫宸片言重山嶽卓彼雲漢文悲喜集中懷慶慰來上賔匪徒事夸耀大莭從此伸鞠躬謝蒼旻何以酬眀恩君親兩毋忘不負六尺身書林萬卷樓為張旻作結繩治已逺人文日漸開素王重埀教六籍森昭回後來厄嬴運一旦成劫灰百家乘時起衆說相喧豗汗青不足紀浩浩山嶽堆紛焉眩人目長短誰能裁張生紹家學結屋崇川隈牙籖列萬卷大貝駢瓊瑰唐虞世斯在周孔道盡該翻閲得妙理培養成令材石渠終寂寞鄴侯安在哉兹樓幸無恙擬作書林魁題李氏歸盤谷卷清江李氏子遐栖蹈髙躅蕭散類輞川幽深若盤谷榮華絶外慕漁樵聊自足終此繼家聲其樂矢弗告杏林生意為王克讓作南州春候早陽和被羣植灼彼林中杏芳妍賁嘉色燦爛曉霞舒可與桃源敵王生抱奇才存心樹隂德疲癃藉旋斡回生詎千億種此酬深恩嵗久日復益神功馴猛獸雅趣慕仙客持是濟利心何時出醫國送張磐石尹通海十二解昔在涒灘嵗應聘入西蜀六年坐臯比取友日滋足一解雲萍固無限膠漆終難尋髙山流水操犖犖稀知音二解臨邛有佳士皓首富經史一見雙眼青忘年等兄弟三解論心濯錦江握手浣花溪詩篇與酒斚過從不計時四解虛名忽上達辟書自天至遙遙惜别情灑灑傷離淚五解朅來蒙國恩備員居成均强顔縉紳後鞠眀仍究曛六解子時攬時事抱策獻閶闔廷議方見從謂可即施設七解朝家重民寄守令須老成滇南固云逺郎官職匪輕八解浩歌金陵市慷慨成激烈念舊詎能忘把袂不忍别九解停雲覆鍾阜商飊鳴鳳臺居人感羣物壯士有逺懷十解要荒囿幅員羌僰同赤子恩信隨所施撫摩先愷悌十一解移栽巴東柏旋植河陽花往軌幸可踵秦越方一家十二解處靜軒為饒季眀賦太虛屏蒙翳森然羅萬象澄淵能鑑物妍媸如在掌倐焉遘風雲對面成惝恍靈臺本熙熙微妙復虛敞眀與日月同量比天地廣情欲或來牽居然蔽塵網伊人事清修飄飄脫羈鞅恬淡百慮消端居志瀟爽每憐牛山木戕伐無時長力探作聖功處靜以自養懷哉太極翁千載絶遺響兹軒著嘉名勞我重嗟賞一樂堂為徐奇上舍賦世間有一樂富貴非所論紛華及盛麗寧復過大倫椿萱秀遲暮棠棣眀陽春熙臺淨無滓盎然和氣臻此事衆所慕欲求渺無因美哉徐氏子獨爾鍾其門鶴髮被台背髙堂具二親丹桂聨清芳籍籍難弟昆春酒介眉夀塤篪奏南薰怡然大塊中煦煦全天真送方𤣥璞還天台商飈動秦淮木落天雨霜相見即相别歸興何倉皇謂言有慈母星星在髙堂定省久已曠手把連環將晨興戒行李趣上江上航片帆入烟霧指日過錢塘天子急求賢夢寐思才良宸衷期上格賚弼自彼蒼旁求藉形像精藝終難藏行當應丹詔載筆趨眀光寄養拙皇風布清穆四海臻泰和故家有喬木生意鍾近柯朝擢藝苑秀暮涉文淵波六籍既淹貫百氏仍爬羅涵蓄渺無涯蜚聲應鳴珂超然謝榮名端居閲羲娥處靜恆自足樂道匪有他由來重交誼許我常相過眀月照長干懷人發浩歌幾回清夜闌夢繞秦淮河送萬載主簿舒懷慶嚴冬十一月木落天雨霜有客捧除書逺道之宜陽青年冨文學鼓篋居上庠蜚聲邁羣英犖犖錐處囊一官職勾稽枳棘栖鳳凰行逺必自邇出奇無循常古來賢達士耿耿勳名芳上致君主聖下使斯民康朂哉崇令德冀爾光吾鄉十一月二十夜夢子嚴外兄己卯嵗自慚孤陋資落落素少偶緬懷骨肉親惟此知心友髫童藉師資相期同白首論情漆在膠談道杵投臼死生成契闊意氣竟誰負今夕復何夕重把平生手悲喜形笑談涕泗被唇口始欣情思真稍悟永訣久蕉鹿既莫憑壑舟去難守招魂覔巫陽孤月在鍾阜送袁景先歸老還鄉十載服官針萍蹤等浮雲勳名雖未就嵗月不待人揚厯遍繁冗白髮生苦辛上疏乞骸骨詔許歸故園鵬程邈難到鷗盟良可馴歸歟尋舊隱超然離塵紛龍江嵗華晏驛道梅花新湖山舊風月遲子來相親謁卞將軍墓忠孝實大莭一門全者稀桓桓卞將軍父子兼有之伊昔晉祚衰狂猘縱橫馳秉國既非人清談了無施臺城一失守生民墜塗泥九廟震戎馬坐覩綱常夷將軍舊忠勇悉力舉義旗揮戈指逆賊捐軀竟難支彼惟眕與盱赴難甘於飴親既為國死誓以身相隨哀哉賢父子至行全民彞邇來千餘年荒墳屹纍纍我行訪遺事徘徊冶亭西英風撼宰木烈莭昭穹碑九原不可作再拜雙淚滋世事幾更代令名日月埀因之感豫懷吾將以為師題白蓮花圗澄澄碧波中皎皎白玉蕊貞姿妬寒梅瑩潔絶纎滓懷哉太極翁愛之比君子披圖起遐思吾將蹈真軌詠逸民六首唐虞世已逺邈焉逮衰殷戡黎啓周業大統集厥勳壺漿來士女四海望陶甄如何首陽下獨有窮餓民采采山中薇大義將焉陳頽波不可挽卓行誰與倫隘雖聖不由求仁斯得仁西郊獲奇獸魯史終筆削列國事紛爭士習縱橫學卓彼魯仲連沖懷隘寥廓緩頰秦師退立談聊城拔竒功不日收世議酬髙爵孰知斯人志飄飄在丘壑翺翔東海上遺蹤散冥漠千載仰髙風於焉可敦薄嬴政逞凶毒㭬喪綱與常志士共扼腕疾走奔四方赫赫隆凖公基漢由三章奈何好慢士溺冠裂其裳商山四老翁髮皓雙眉厖非因國本重安能趨帝傍奇哉子房策既以用其良一言回主意期期愧周昌聖門三千徒一一皆佳士時君問其賢獨屬屢空子仰鑽及瞻忽駸駸殊未止惜哉天喪豫一慟回也死游目秦漢間舉世難與比孰知千載下乃有牛醫嗣汪汪千頃陂渺漫無涯涘不見鄙吝生德馨照青史世人膠外紛得失互相戰冨貴衆所欲孰肯居貧賤龎公沮溺徒卓卓有髙見深耕隱鹿門素無功名願安危本殊途妻子匪不戀刺史弗深知致詞徒繾綣髙人有逺情塵俗莫能纍形迹茍相忘飄飄自遺世吁嗟晉室衰士習薄名義淵眀千載賢獨爾抱深喟仰觀世運移俯嘆川流逝怡顔藉庭柯折腰愧時吏茫茫大化中此身本如寄持此何所之酒中有深味送童景庸還天台鸑鷟出丹穴瑶璵産崑崙古來才俊士多育賢者門侯城方夫子學貫天與人立言翼往聖行道輔眀君遂令天下士延頸望陶甄美人秉髙志質性溫且淳蚤立程門雪摛辭藹春雲籍湜踵昌黎董薛紹河汾願言勇努力期爾繼斯文長洲陸節婦詩修短歸大化孰能究斯理嗟哉我良人盛年委流水鏡缺無復完璧玼終致毁既乖偕老願詎忍不即死素帷暗空閨青燈照孤寐欲鞠膝下兒免作若敖鬼兒身幸已成叨恩宰百里諒彼九京人瞑目黃泉裏共姜秉髙莭柏舟以自矢陸母何獨賢千載蹈貞軌題朱仲志師古堂冥趨每多躓妄作譏無徴君子戒自用牆面何由行典謨埀聖訓墳史昭日星閲之理未至自足咨老成朱侯金華英致身當盛眀剖竹分郡符循政聞大廷夏侯善決疑為士須眀經延夀尚德化禮義為干楨師古信有德汗簡流芳聲朂哉蹈貞軌以作吾邦榮題曽才魯紫泉亭鬱林奠南服發祥由地靈眀時不愛寶寒泉著休徴􅀈沸迸岩竇縈回出林坰色比馬肝瑩光徹壺冰清邦人聚觀者奔走填周行孰知兆此秀乃屬芹宫英折桂入天府賔興造王庭得官雖未顯教鐸春風鳴甌閩道匪遙企望難為情至今餞别處猶以兹泉名送康知縣之任安嶽丈夫抱才藝譬若囊中錐不遇盤與錯利器將焉施康侯青雲彥敡厯非一時朅來綰銅章出宰潼水湄隴雲接棧道暑雨驊騮嘶皇情重民瘼去去行勿遲題芮知府敬亭山房峩峩敬亭山山色含蒼翠兩水夾寒麓雙橋倚空際若人結幽居挹此清淑氣開軒納浮爽游目豁氛翳坐使靈臺眀涵養成利器兩剖名郡符屢受民社寄每念居處崇深念生民瘁國爾竟忘家故廬何由至石田長莓苔茅屋搴蘿薜山靈問歸期白首功名遂史館和侍講方先生韻二首丹華散虛彩萬里流光清夜陪玉堂仙髙論藹餘情維時當首夏神皋寒暑平著述豈其事纘纘蛙蚓鳴知心諒獨難不忝斯為榮終期繼先業即綴末簡名闕資訓堂卜築松門裏地僻塵迹疏清溪走墟落列岫當庭除隨時事耕稼亦復尋樵漁此身既足資遺後將焉如宗祖有眀訓聖哲埀典謨一飯三顧諟惕惕當自虞居富戒不仁力學期去愚凜哉名堂義珍重為爾書送羅以道御史歸省商飈動西墅落葉辭庭柯時序易遷轉仰視鴻鴈過柏臺有名士感慨良已多一從服官針日月如飛梭子職既久曠親鬢諒已皤恩榮賜歸省秦淮發輕舸驄馬耀秋日繡衣眀素波男兒能似此親樂當如何送陳檢討子魯歸省風生牛渚秋雨霽龍江曉白浪送歸舟青山閲飛鳥夫君清時彥意氣何矯矯旅食金陵春久視玉堂草顧問每生輝論思足行道念彼慈闈親容髮日衰老陳辭謁聖眀豫告感𤣥造違離未必愁會晤豈為好推恩及存亡真足慰懷抱題畫慨我行四方汗漫嵗月深家山逺在望無由一登臨去時門前松偃蹇不及尋歸計眇未卜此松已成林草堂俯幽谷柴門掩遙岑何時解簮組永遂夙昔心題黃侍中翠微書舍十解環池皆名山山深積蒼翠長夏晴雪飛無雲亦隂翳一解清秀日凝結鍾作人中英築廬兹山下藏修斂輝聲二解韋編富五車牙籖盈萬軸嵐光入綺疏藝香繞林麓三解屋頭有流水時作幽琴鳴掩卷欲細聽風移過前楹四解獨有對面峰千嵗色不改舉頭每見之心期良有在五解端坐肆翻閲靜心玩古今遙遙莘野志沉沉梁甫吟六解時來不可止囊錐頴終脫決策當大廷魁名獨先奪七解詞垣暨南宫終嵗知幾遷致君堯舜上步武夔龍間八解遂令四海人延頸望陶冶願比觸石雲崇朝雨天下九解時序迅若箭勳業冝早修功成身退日歸伴赤松遊十解送朱思平侍書歸省風號江浦冬雁落秦淮曉有客將逺歸秣馬涉長道峩峩天台山遙接蓬瀛島赤霞覆其巔祥光耀穹昊伊人稟靈秀育質鍾神造一舉擢巍科筮仕及年少待詔金馬門侍書丹鳳沼三年瞬息過瞻雲介懷抱陳情達九重歸興入毫杪霜楓纈晴綺寒梅散冰縞交輝絢錦袍喜映慈容好送陸伯瞻主事使朝鮮皇眀受天命海靜波不驚一統大無外萬國皆來庭聖人坐法宫端拱思穆清朝鮮古名國畏天慕儀刑仁賢遺德化禮義為干楨至今數千載文獻猶足徴陸君漢臣裔儒林蚤蜚英星軺奉丹詔使莭下青冥殊方固云逺王事式有程朔風襲重裘祖道列都城橐金豈足羡専對夙所能相期聖化宣庶以承家聲題薛孟式滄灣漁舍榮名非夙願幽貞素所服沖懷絶外紛結廬滄江曲涼薰生密䕃時雨漲新渌水暖鱖魚肥生涯一竿竹得魚不思鬻甕頭酒初熟擊鮮旋篘醇雅趣聊自足人生貴有適無為浪奔逐咄此終吾身悠然矢弗告五言律詩和滕至剛韻兼簡頂𤣥極長老二首落落星懸曉依依柏傲林文章千古事湖海十年心一别巴川逺重逢嵗月深舊交誰在眼惟子最知音叢林清譽重湖海慣遨遊翠竹存吾道黃花映毳裘談𤣥風穴輩達理大顛流欲效留衣别容豫入社不南中道中口號自入南中境愁容益以侵有懷常作夢無物不傷心月落關河逺春來雨露深靈丘何處是遙望淚沾襟早行孤館驚殘漏登途竟若迷山形存隱約地勢失髙低薄曙欺殘月哀猿和早雞忽聞飛瀑響已過石橋西滴淚坡危崖通絶磴枯木挂長蘿懷古夜郎道勞神滴淚坡隂晴咫尺異冰雪澗溝多嵗暮仍行役私情可奈何送戚行人萬里簮纓客三吳閥閲家少年登月窟今日泛星槎使莭翩翩影江梅處處花壯遊當盛世談笑賦皇華和林嘉猷韻自作西川客何曽浪出遊幸承恩命及不計路程修鶴唳山村曉林空木葉秋眉山文熖在燁燁倚雲浮敬和賜何通判韻佐政當繁劇懷才際聖眀賜詩雲翰重前席寵光生已勵鵾鵬志還聞冰蘗聲絃歌文化日好繼昔名卿夏夜和鄭叔貞韻虛堂無溽暑清氣入懷中故友三年别良宵一笑同薰風來廣席眀月上遙峰傾倒論心臆何須候過鴻都昌丞洪宗傑秩滿邑民詣闕願留因升縣令憶過都昌道民風厚且淳蘇山眀浦漵彭蠡枕城闉父老爭留霸朝廷許借恂二松哦且遍滿縣李桃春送徐庭舒省親太學游歌久慈親雪滿頭寸心常愛日千里趣歸舟把酒烏衣巷瞻雲白鷺洲上堂稱夀畢還斾莫淹留送王修蓬萊縣丞聖朝崇政教學省足英才東魯推多士南山詠有臺買舟行濟瀆指日到蓬萊佐政有餘暇新詩取次裁送晏助教改判徐州王門曳裾久學省足優游聲名重拱璧去就輕浮漚論事竭丹悃著書成白頭移官得半刺道行復何求贈祝少卿仗策轅門日才猷著契丹是非天意在得失我心安寵極承新命時來復舊官佇看龍種盛色别似雲攢送襄陽僧綱叢林馳譽久未許即幽棲禪學雖心解僧綱要力提承恩魏闕北歸路鹿門西去去襄陽道雲山望欲迷送葉履道僉憲廣西秉筆寓鑾坡相看鬢已皤神功勞紀述臬府聽揮呵百粵山川逺三台雨露多繡衣行部日桂嶺正嵯峨七言古詩送王仲修還鄉去年同發雙溪頭山川萬里屬壯遊鄱陽蕩漾一葉舟巫峽瀲灔風濤秋艱險備嘗如浮漚賴子慰藉百不憂朝連衽席夕共裯相看平步登瀛洲錦城自昔稱名州岷峨萬疊瓊瑶浮草堂遺跡倚江流森森閟宫祠武侯居人十萬烟火稠習俗多與東州侔徘徊不覺嵗已周人事稍洽情義投異鄉逢人可解愁況此情意相綢繆胡為告别情悠悠飄然欲便歸故丘髙堂有親七十優倚門鶴髮風颼颼兩年不知甘㫖羞子職一曠終身尤余亦有家青岩陬石田茅屋柴門幽自從來作功名謀幾回欲往嗟無由今朝見子理歸艀心旌蕩蕩風中幬執手河梁泪未收願言速來為我儔願言速來為我儔題南山讀書處卷幘峯之山髙插天扶輿磅礴溟海堧鍾靈擅秀青卓玉上拄日月褰雲烟若人結廬在山麓炯炯虛眀夜生屋生來不喜弄綺紈架插鄴侯書萬軸青燈夜雨聲伊吾雞窗曉雪清光敷神交太古隘流俗尚友顔孟游唐虞美人自昔多意氣折得蟾宫一枝桂共誇平步上皇州回首故山渺何處渺何處在天台天台之境如蓬萊三年馳驅走南北吁嗟舊隱生蒼苔題蘇武牧羝圖闕繼志齊集卷三
