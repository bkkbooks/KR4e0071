body:
  text: 繼志齋集卷四明王紳撰七言律詩調絃江上夜坐冠蓋相從覲九天扁舟孤下泊調絃月華散水金鎔冶霧氣橫江練鎖川東望金華家咫尺西瞻錦里路三千此時無限相思意坐對江楓夜不眠題延翠齋陳耕樂上清道士十里煙蘿翠作堆道人家在石岩隈門涵碧落軒窗淨席擁青冥圖畫開山雨欲來松竹潤嶺雲初去鶴猿猜誰能分我數椽地一洗襟懷亦快哉遊善法堂我愛城南隱者家一泓流水碧桃花屋頭岩溜飛寒瀑門外晴嵐接晚霞地僻四時無過客山暄二月摘新茶嗟豫擾擾勞行役直欲相從度歲華贈進大道上人雲南三年奔走厭紅塵偏愛山中道趣真月轉祗園天不夜花生淨域地常春講經有理懷支遁問難無窮忝許詢情事未伸天罔極幾思結杜扣良因奉教和資中八景重龍晴嵐雨餘山水放清輝驚見輕嵐上翠微薄影漸因紅日淡餘氛猶逐白雲遲如綃漠漠籠僧寺似雨霏霏護石池底事往來岩壑上欲隨祥靄出明時醮壇雲梯仙家咫尺隔塵凡寂寞當年古石壇蒼蘚重封層磴足白雲深鎖石梯端眼前日月彈丸急腳底煙霞圖畫間欲訪安期問真訣置身此地杳冥間官渡春波憶惜當年此問津渡頭青草滿堤生行人日暮呼舟急稍子心諳蹴浪輕白石清泉明素志滄浪緑水濯塵纓因兹郤動西陵興幾度思鄉夢不成珠江夜月華月初生古渡頭氷輪出水未曽收行看尚覺光微動佇見方知影不流萬頃碧波眀午夜一泓清水占先秋當時誰有坡仙趣釃酒臨江重倡酬盤峯暮雨薄暮蒼芒雨滿空開簾已失眼前峰歸鴉翅重飛還止别墅雲迷淡又濃牧子荷蓑愁日暝羣蠻含帽不頭童荒村燈火沈沈靜祇聽招提遞逺鐘漁汀晚照欵乃歌聲酒力微蘆花汀上見斜暉回光布彩隨流水返照依霞散古磯隱約漁燈猶未起蒼茫釣艇已先歸何當來作煙波侣共和漁汀晚照詩靈岩泉韻靈岩聳拔接孤岑中有幽泉冽且深崖呼逺來稱石髓闕春滿川巴日正長龍橋麗色藹蒼茫江花擁雪舒晴白堤栁拖金裊嫩黃漁浦水生橫舴艋沙洲日暖睡鴛鴦浩歌一曲無人和物候驚心謾慨慷鴈塔秋聲崚嶒鴈塔倚蒼空猶自支撑瓦礫叢前代人名摩滅盡清秋天籟杳冥中芳聲寂寂消秋雨餘韻沈沈托候蟲尚想慈恩舊遊處少陵遺興藹無窮曲水流觴輕寒輕暖日舒遲勝賞隨心是處宜澗水引來應自曲羽觴流至不容辭山隂遺迹羲之往沂上風流點也知不是君王文治洽誰將往事樂明時鐵峯聳翠安嶽名山號鐵峯層巒疊嶂聳重重雨過翠色排螺鈿雪後清姿見柏松竒秀堪為佳阜儷孤髙獨讓岱山宗何時能著謝公屐來與山靈一笑逢簡袁公弼休政歸來席未溫關中父老總能論鑑湖一曲終須賜陶徑孤松喜尚存夜雨簡編窮歲月春風蘭蕙長兒孫閉廬僵卧家聲逺坐對岷峨雪滿門丁丑除夜夢母舅養素先生歲華慘淡月朦朧夢入家中千萬重一世死生勞想像五更長短見形容壑舟不繫應長往蕉鹿無憑莫再逢回首渭陽何處是城頭寒鼓起􅕣鼕挽安老先生二首儒林祭酒魯靈光白首専門杜濫觴千古文章懸皎日一生德業簡賢王玉樓作記神先往丹旐書名夜正長喜有及門諸弟子肯令端木獨居場又晨星落落老儒宗佐政親藩道益崇車馬列陳稽古力君臣遭遇贊襄功訃聞當寧興長悼魄入佳城保令終莫嘆首邱歸未得二蘇遺塜汝城東喜赦詩為憲臺諸公賦丹鳯銜書下紫宸覃恩深喜及無垠肖翹共覩乾坤大枯朽齊沾雨露均文景規模真足繼成康德業已堪論烏臺諸相心如水日對岷峨道氣新和吳原頥喜雪韻天皇昨夜駕雲車上苑璚林總散花石獸荒涼俄擁腫茅簷垂凍互聱牙欲尋東剡王公棹難覔西湖處士家賴有蘇公作司業酒錢頻與不須賖和晏助教賜茵褥詩文茵新賜制平寬坐比臯比軟更安自是皇家崇聖教故令洪澤及儒官陽回孔席春先暖雪積程門書缺莫嘆廣文官獨冷當思機杼女工難送周大慶歸省三月金陵花欲燃胡為歸興忽翩翩年來鶴髮久違養春滿雲衢未著鞭雨過匡廬千嶂淨風輕彭蠡片帆懸清秋桂子飄香日穩步蟾宫待子先送王俊用監丞東海名邦應上台紛紛人物總賢才範模自足儀多士姓字相傳遍八垓日麗赤城斑袂舞雲橫蒼嶺錦衣回兒童不識先生面爭道朝中使客來送劉宗上舍省親輕暖輕寒三月春鶯啼花發總精神獨憐太學青年客能念髙堂白髮親鍾阜山前揚去斾嚴陵灘上識歸津此行取道桐君里不老仙方問異人送王僉事復任之成都日近瑶天雪乍融御溝氷解水溶溶豸冠久著風霜肅烏府重承雨露濃舟上瞿塘看灔澦春生錦里種芙蓉蜀中童白諳名姓竹馬相迎喜再逢和無為張真人見寄韻當年躡屩上清中指點虛無問道宗幾共五更聽夜雨長懷一月坐春風身遊璧水功名薄目斷耆山譽望隆千里緘詩勞問訊詞源決峽勢何窮學道多年覺有情幾思發軔繼周程一經蚤授慚韋相三䇿將陳愧董生暑雨論心龍虎地春風握手鳯凰城何當解綬東歸去再向玄都問舊盟送陳信歸省三年遊學寓金陵夜雨青燈萬里情雲起岷峨親在望雪消巴蜀水初生鳥啼花落俱成恨水逺山長莫計程樂育君恩深似海促裝母待斷機聲再和張真人見寄韻二首坐看日月走壺中久識虛無是本宗瑶草香生璚署雨巖花影動石壇風衣冠奕世名何逺印劍傳家譽自隆長憶耆山舊遊日仙岩髙處興無窮世故悠悠不動情致身偶爾入雲程談玄每遇青牛客進諫徒懷白馬生鳴佩趨朝鍾阜月登臺吊古石頭城自知家學慙司馬空負山中歲晏盟題徐子明雅淡軒蕭然一室僅環堵柏子銷時日過午古琴撫罷風滿簾深杯邀得月當户往來問卜無白丁過從談論皆鴻生俗態已忘世慮息雅淡中含太古情題吳文質嵩陽雲樹延平自昔佳山水聞説嵩陽景更竒溪樹藏煙隂欲雨嶺雲出岫霽無時輞川寂寞今誰在盤谷幽深隱者宜一自承恩居帝里披圖猶起考磐思七言絶句題墨竹湘江春暮雨霏霏舟泊黃陵酒力微夜半開篷羣玉響天風吹下鳯凰飛送稌東歸并示穆穰稔輩六首象鼻原頭萬本松清隂周匝護新封也知世澤應鍾此近歲多承雨露濃青岩山下石溪頭草屋柴門事事幽但奉歡娛養慈母榮名勢利不須求百畝山田繞敝廬近年豐歉竟何如諸郎若肯勤耕種甘旨時供定有餘夜讀詩書朝出耕古人多此寄深情殷勤語汝諸兄弟好盡彛倫學董生五年滇蜀倦奔馳兩鬢蕭蕭齒亦稀宦業未成人漸老始知三十九年非湖海淹留歲月深蕭條苦乏滿籝金傳家幸有遺經在遲汝重來共寸隂題墨竹瀟湘江上暮雲迷落日無人翠羽低􅋈棹黃陵廟前宿一篷春雨鷓鴣啼題小畫三首青蘿山下松濤室幾度臨風憶舊遊今日畫圖看髣佛淡雲疏木不勝秋古樹森沈俯碧灣江花擁雪正漫漫海門潮落舟歸晚鐵笛幾聲人倚闌三月桃花浪蹴紅繫船晒網夕陽中賣魚買得潯陽酒岩樹生隂坐晚風龔給事家索菊長安門外禁垣西公館幽深帶小蹊滿圃黃花誰占得清香曽許我分携題野航徐氏雙竹圖翛然谷口碧琅玕影落澄波夜正寒獨倚野航人寂寂月華浮水度雙鸞送漢陽安知州之任太平不釣渭溪璜白首之官上漢陽鸚鵡洲中舊風月從今收拾到黃堂題思萱堂手種萱花近北堂慈親相對百憂忘年來太學遊歌久一向春暉一斷腸題畫梅憶昔黃昏訪老逋小舟乘月渡西湖暗香浮動人聲寂皓鶴飛來隻影孤題墨竹三首瀟湘江上暮春時舟泊黃陵思欲迷夜半忽驚風雨作瀟瀟兩岸鷓鴣啼子猷宅畔尋常見蔣詡門前次第栽山館日斜無俗客清隂忽過短墻來慨我居官歲月多每於紫陌聽鳴珂天風忽起王猷宅倣佛朝回闕下過寄章同吉三絶句兼柬范叔彝懷人萬里思悠悠清夢尋常到益州昨夜冥鴻將信至開緘字字解豫愁五更踏月候朝鐘退食詞垣旭日紅金匱玉函披閲遍從容無復舊時風范郎辭翰儘堪誇五色卿雲簉彩霞不寄冷官王仲子封題偏到繡衣家題李白小像一自騎鯨去不回風流千古數雄才至今采石江頭月猶共長庚燭九垓寄叔雍舍姪三首百畝良田不間畦息耕亭畔曲江湄五年不踏江頭路明月清風午夜思長憶青岩舊草堂手栽松竹翠成行諸兒未了公私事三徑年來想就荒滿城風雨五更寒燈火趍朝夜未闌年少曽誇華冕貴老來方覺布衣安題夾梅竹月白風清夜未央小窗人靜漏偏長翩翩翠鳥來何處隻影飛隨白鳯凰題雪棹圖萬頃頑雲撥不開山河大地總皚皚懷人夜出山隂逺興盡何妨半路回繼志齋集卷四
