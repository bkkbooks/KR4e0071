body:
  text: 繼志齊集卷一眀王紳撰曲擬大眀鐃歌鼓吹曲十二首闕誕敷物阜民康舉手加額以祝我王王不自居曰豫臣之良其臣伊誰聿有夀考為國元僚是曰安老惟安老公王躬是保匪義不陳匪德不導王曰豫學汝其輔之王曰豫政汝其助之公拜稽首對揚王休人亦有言無德不酬治化攸敷厥既有徴寵利弗居天道惡盈懇懇有詞請命大廷天子曰俞嘉爾老成式休爾政仍優爾祿匪曰爾私敷錫汝福大哉綸言降于九重王曰上命豫敢弗從乃錫安車以奉其行乃錫華宴以娛其情扶老歡迎出入其承為國之禎為士之榮公曰是恩千載奇逢受寵若驚心益忡忡伊昔有聖志在眀農豫豈若儔適諧其衷岷山峨峨江水沉沉公有嘉猷簡在王心公有善政播在德音我懷若人無古無今右眀農九章章八句五言古體詩上已日迎駕宿新都寶光寺東風扇微和旭日絢陽春晨興秣我馬駕言出城闉矯首京華道遙遙望清塵先驅曽未至盻睞徒勞神解鞍憩古剎息慮澄吾真野人好辭色日夕羅盤飱佳莭獲良會慨羡誠難頻行當盡一醉鼓腹歌君恩敬和中秋對月睿製天髙秋正中皓氣澄太虛素娥散清彩皎皎臨寰區惟時明哲王恭默萬慮無異香浮寶鴨淨影印玉除心逺景由寂神清情自娛至化基二南令譽騰九衢德尊意彌下出入從師虞聖道本宏逺堯舜猶病諸願言思太康益進無逸圗過陸宣公墓峩峩忠州山隱隱哲人墓寒烟鎖銘碑落日照封樹緬惟貞元間唐室失其馭逼仄梁洋行間關奉天駐蒸黎紛播遷小大懷憂懼不有撥亂才蒼生孰依據維公王佐資極力殫衷愫回天挽日月朵頤揮衆侮相業雖未終功名亦朝露左遷固未辜兹焉豈其所至今讀遺事令人淚如雨我行全蜀間舟經冢下路風順帆腹飽日入川光暮扳躋不可得躑躅頻延佇艤棹山月生開篷展中慕謁余忠宣公廟昔在元祚去四海遭亂離羣雄互驅逐戎馬縱橫馳降城販國者比比忘忸怩坐令疆宇蹙百二山河隳桓桓忠宣公耿耿匡濟資蚤負經綸具晚鎮舒江湄七年握兵符裒集多義師控禦既云備撫輯亦己綏奈何荆楚間闕去住心忡仲江花擁層浪栁絮舞和風覩物易感傷未别思重逢執手雙溪上相看淡無容願言善自愛冀爾振吾宗題杏林圗東風扇微和萬木敷芳芬嘉林有名果不與凡植羣伊花炫眀麗厥核存至仁惟昔有仙子志在蘇罷民年深功己著植之滿比鄰至今千載下藹藹埀令聞卓哉夀昜彥文質何彬彬種德如種杏擇術非為貧存心惟愛物托此康斯人不聞聖有訓作善福可臻願言勉自强往軌良可遵中秋夜坐留别鄒公瑾孟子彞皎皎今夜月中天溜清光嬋娟絶纎翳彩魄仍飛揚憐我二三友夙昔遙相望兹夕復何夕列坐開壺觴情真任疏散醴薄味趣長朋簮喜己盍謂言樂未央奈此簡書逼去住心惶惶浩歌成激烈仰視參與商會合自有期毋為重悲傷雲山千萬重眀發遵周行迹逺心在邇矯首何時忘簡鄭叔貞四十二韻結交匪無人知巳貴有適十年走東西浩懷久無得中嵗友鄭子誠哉我三益文采絢鸞鳳才華炫金璧譬若雲臺將折衝懾强敵叱咤驚鬼神人馬皆辟易又若鄧林材挺出樗與櫟蔚為棟梁望庸豎所共識器大不小成材良逺繩墨物理古則然子實甘蓬蓽迢遞天台山回首關河隔旅食困鹽虀久作山南客為言從師游擔簦來卒業阿師正學公長才駕濂洛兒童推世賢朝野稱文伯蹇豫在弱冠共寓蘿山宅雖號同門生實藉師資德叩道辱弦應問疑承縷析乍别書纍篇同處日共食契誼等弟昆交情固膠漆一自事分離十載關良覿重逢錦水濵握手道夙昔雲萍總心知顧我眼獨碧惟子蚤及門器業尤英特鑽瞻久己悟升堂仍入室董薛未足倫游夏庶其匹賢王雅樂道醴筵日宏設羡子富文辭諏咨動移刻屢續梁園賦每前賈生席緇衣敝復為白駒去還縶恩禮實己隆負荷成感激念我自逺歸神疲肢體瘠慰藉盡衷曲周旋竟晨夕維時秋正髙商飇怯絺綌籬菊吐芳華鮮鮮鬬黃白呼兒具雞黍郫筒篘釀秫情真味自長道合趣何極盍簮人所樂況爾同師澤萬里獲良晤欣忭冝無斁聖轍豈難追行之在不息但願長相親永言共鞭辟題松雪軒鬱鬱蒼虯形孤根盤厚土皎皎白羽姿逺自雲端下叶音户氣味本不侔忽爾相依附清白人共嘉會合天所與伊誰搆軒居對之有佳趣風號龍虎吟嵗晏珠玉聚願言同此心貞素以相處思親堂烏鳥啼北林白雲度東嶺慨慷游子懷感物清夜永雙親七十餘黃髮颯盈頂一從走東西三年暌定省纎纎寸草心遙遙萬里逈宦游豈不嘉衷情安可屏陟屺復陟岵跂足且延頸眄睞目生花淚下急如綆髙堂扁思親著此情耿耿何時奉周旋允言遂深幸病中述懷十首人身配兩儀至和乃無愆運行一差忒百疾從兹纒智人善保養調攝歸本然曰豫昧斯理情欲不自宣內感仍外傷水火相凝煎形神幾巳離榮衛失其源匪藉湯劑勳胡能茍偷安誓將更生日保身如臨淵上以奉遺體下以全天年負痾己逾月今晨覺少康稍興臨古鏡頽顔忽半蒼灼彼東籬菊依依傲寒霜雖然質柔弱晚莭猶含芳此身胡不如撫己成慨慷人生匪金石盛衰固其常但得保其真榮悴非所傷爐烟揚微熏簷花散餘馥身閒心自清病可神始足矯首對金門怡情陶玉燭至人淡無為懲忿仍窒欲斯民囿泰和熙熙臻百福微臣負末藝浮辭厭人目每承恩寵加清光日回矚蜂蟻識天倫葵藿傾朝旭徒有眷眷心時效華封祝端坐一室內默參𤣥化機玉宇正寥廓金飇亦淒其寒暑互來􅉨晨興聿授衣人生百年中諒非金石姿乃欲圗不朽弗修竟何為齊侯馬千駟顔子恆抱飢孰知千載後嗷嗷紛是非西風從何來逺遞庭葉至飄飄颯有聲來向書窗墜景物易轉遷時序忽己異羈客念故鄉中夜不成寐仰睇河漢明俯聞鴻鴈唳翩然逸興舉恨無凌風翅去古日己逺淳風日以漓人情善誕幻去就浮雲馳彼欲憸險子出沒神鬼奇炎涼隨勢附朱粉從心施一朝冥機至反成拙與癡於皇賦眀命顧諟常在斯不聞聖有訓居易以俟之殷勤謝天君為我慎操持靈龜本多夀乃為人所戕蜉蝤最微弱朝夕寄存亡修短歸大化疇其較彭殤君子貴修持夕惕以自强毋為纍形役擾擾徒敝傷金張極盛麗回首如爝光黃憲苦清修人以亞聖方富貴果何物當圗身後芳伊尹耕莘野志在康斯民孔眀卧隆中所懷務經綸𤣥造生賢聖拯彼愚與昏觀其立勳業萬世光炳燉伊人久己逝斯道幸未湮疇能繼其踵後來寂無聞但見夸毗子恬然忘本真捷捷負才慧區區周自身要顯患得失草莽憂賤貧胡不徇所務成功追古人𤣥冥一司令萬植皆歸根惟彼籬下草荄葉自藝藝洪造匪有私天意含至仁故兹肅殺日生意猶斯存達人悟𤣥妙體物思修身豈謂造次頃敢使德不純卓哉無極翁襟懷盎陽春庭草故不除于以觀天真徜徉衡門裏積疢頗以安藥石有時親塵俗不我干雖欣神慮得且畏時序遷扶憊挾黃卷幸見孔與顔沉吟北窗下髙睨太古前曠懷隘宇宙浩氣凌雲烟何以解藴抱奈此酒量慳持觴縱不飲對之亦陶然南行道中述懷二首嵗晏霜雪零驅車即長路雲山杳茫茫舉趾將焉赴迢迢滇南道惻惻終身慕志在忘險夷情深略憂懼風號林聲凄日落嵐光暮哀猿抱子啼慈烏返初哺物理古則然我生亦何故撫景增愴悽仰天淚如注滇雲接馬首僰道盤羊腸感慨情思惡登頓肢體傷平生終天恨今日許豫償但得情事申豈憚關山長豺獺知報本春秋事蒸嘗惟人有天性肻愧虎與狼哀哀王裒氏久廢蓼莪章我生千載下衷情允相望贈楊宗彞出處非可謀道義貴有得疇能盡真修油油遂清適卓哉銀塘翁飄然髮埀白祿食二十年中外遍敡厯宦遊豈不嘉奈此崦嵫逼況有父子情久矣萬里隔陳辭解官綬徜徉躡泉石遊魚思深囦倦鳥戢飛翼理得趣自真俯仰契𤣥賾孰謂天杳冥惠迪終承吉題坦然齊去古日以逺機巧日以生紛紛任鈎巨無復存至誠孰知𤣥妙理所貴在坦平美人領斯趣百慮帖然凝閉門謝往來絶口輕縱橫但欣情意得不識辱與榮浮雲去復還飄颻傍幽扃好月不待招清夜當户眀幸有一尊酒聊以娛吾情悠悠身外事居易復何營魚梁坡我登魚梁坡維時日初未陟降直雲端指顧彌空際嵐光接杳冥林姿積蒼翠行行層復層己極巍峩勢恍疑身近天未覺足行地俯見千仞溝惕惕增豫悸僕夫相告言力乏須少憩輟步心漸平徘徊得深意夜郎驛自行播州境人事覺稍優野闢停傳飾俗朴居民稠迢迢夜郎道熙熙左衽儔鵙舌口中語咿嚘道邉謳下焉樂眀守上焉洽皇猷詎云蠻貊陋直與華夏侔伊昔謫仙子匹馬曽兹遊懷人劇感慨中夜翻百憂象鼻嶺晨興陟修途危險誠己極舉步脛抵腦汚泥深沒膝林箐凝清寒䕫魅啼白曰夷獠恃阻艱狙伺伏深密鳥言人弗諳毒矢應弦急聚散呼嘯間冦敓窮奸譎嗟我孱弱資區區守蓬蓽胡為事遙邁形疲仍股栗蠻烟暗冥冥瘴雨低濕濕劬勩心所甘情事何時畢盤江盤江瘴癘地氣候誠不平鄰壤盛雨雪秋冬劇嚴凝惟兹十里內炎埃障修程山川本不異咫尺殊隂晴戚戚巡候吏奄奄謫戍兵飢虛迫憂患羸弱存敝形來者不滿嵗死者如傳更當今際隆盛治化稱休貞疇其任燮理坐使同清眀除夜世俗重除莭處處羅杯盤謂言嵗作勞及兹聊與歡我行蠻貊中其風亦復然俗樂競吹彈土缶陳腥羶歌呼相聚會咿嚘劇喧闐見之感豫懷中夜百憂煎豈不有至親迢遞隔山川相思不相見離恨終長年撫時重歎息掩袂嗟澘焉遊大佛寺舟行困局促登髙肆舒敞極目縱遐觀騁心獲幽賞峩峩金仙容屹立髙千丈㠝岏自天成靈光騰漭漾晨鐘發幽籟毛骨生蕭爽黃花送晚芳翠竹侵寒幌坐探西來意勞我重俯仰種德堂為程克新作於皇降眀德惟人共稟之培養弗自戕庶可全良彞瞻彼黍與禾芃芃秀東菑茍非種藝力根本從何施美人達𤣥妙立志亦己奇謂欲樹隂功衆技莫若醫軒岐幸有法盧扁良可師持此濟吾術存心恆在兹駸駸嵗月邁浩浩隂陽移願言勿終怠勉哉圗務滋贈皇甫斌皎皎丹鳳雛羽翮初未長爛焉九苞文絢絢流晶光乘風出丹穴意欲習翺翔斂威備容儀來憩渝山陽依棲既得所修養惟有方但能忘青雲期爾鳴朝陽題山水圖澄江波粼粼弱栁枝裊裊結廬在繁隂隨時事漁釣紫芝無續歌陽春有餘調縱浪烟波中清風滿孤棹題翠微深處為傑斗南上人作心閒境自清境清神愈適是以曠達姿遐蹤寄幽僻方外有名區峯巒翠如積其中窅且冥遼遼塵俗隔髙人海上來閻浮遍遊厯蚤嵗悟三空冥栖縛禪寂杖藜入空青斗室生虛白人我久己忘門羅㸃頭石雨過寒襲人雲收山在席孰謂西土遙于焉真淨域題於仲寬耕樂軒道在情可娛業安心足適自昔超邁姿栖栖依稼穡伊人負幽趣蚤嵗任民職一朝解組綬萬里來蠻貊世慮幸己忘躬耕期戮力謀生效子真遺安慕龎德寵辱了不知寒暑任更易但願嵗功熙永言遂怡懌黑松林曲靖有松林逶迤百餘里蒼蒼無異色鬱鬱有佳致靈籟天上來怒濤樾間起赫日任行空凄飇常襲體慨彼貞素姿一一皆有以大足任棟梁小可就規矩無能致通都寂寞徒自棄邱壑多遺材達路少廢枳斯理諒闕仙子栖冥寄邱壑其間窅且幽豈無托寥廓幾欲相追尋又恐其蹤邈龍頂先春洪造本無私大鈞同一囿如何龍頂山莭氣分先後崇岡鸞鳳翔復嶺龍蛇走和叔之所鍾春陽每超湊疏疏壠梅新纎纎澗草秀化工妙且神此理詎難究至和氣自殷何必拘常候東樓晚照潼川之東山上有古書樓相傳唐趙蕤於中注春秋伊人久己化其迹尚可求落日下平陸登眺光未收餘輝射崇甍殘影下簷頭徙倚對西山爽氣皓若浮撫今重懷古行歌且歸休張把舞草化工賦羣品動植各有彞茍為失其性猜詫人共疑古潼有異草枝葉何葳蕤婥約解人意婉媚存妓姿無風自傾舞俯仰如有知惜哉長路傍甘為牧竪欺我欲植其根怪物世所蚩北巖琴泉北巖有寒泉其音寂且清譬如焦尾琴空中調徽聲入耳自厯厯臨風常泠泠可以解愠抱可以娛心情蕭然疏以越絶響聞青冥寥寥太古意誰復於斯徴幾欲策藜杖臨之濯塵纓涪江夜調涪江勢若奔晝夜歸朝宗嶙峋灘上石屹立當其衝激之成天籟清響振秋空午夜月華眀鸞鳳遙相逢毶毶下和鳴徽音中商宫伯牙有餘思子期渺遺蹤疇能領其趣此調髙無窮南山暮雨薄暮嵐光浮林巒倐䝉翳日晷未下山雨腳己埀地沉沉猿鶴吟勃勃蛟龍氣雷轟岩石裂瀑瀉銀河注四顧毛髮張惕惕增豫畏須臾天威收風月浩無際萬象儼森羅太空本何意鶴林春色鶴林美風景凜凜嵗寒色況兹陽和交蒼翠鬱如積鮮鮮素羽禽皓皓雪霜翼逐時自生成熙熙性舒適勝地布黃金奇葩攢白壁僧舍鎖烟霞梵宫炫黃碧回顧花栁區徒能為形役兜率烟霞潼川古招提久矣擅名勝烟霞翠作堆直據烟霞頂蒼蒼異人世漠漠通仙境下視閻浮間可與蔚藍並老僧不出戶蒲團坐幽靜溟涬天地間蒼茫嵗月永禪悅不知時賴有晨鐘省五仙趙蕤髙人抱沖志不與凡士同譬之凌霄鶴雞鶩安能從邈哉趙大賔錦繡盤心胸百家盡研究探索歸會通業成事肥遁不肯干王公竟作赤松遊千載存徽風文冢卓哉劉拾遺上書諫其君逆鱗固難批忠憤須具陳書成君不聽從此終沉淪至今潼川境有冢瘞其文寒烟被宿草西風送浮雲吁嗟身後名過者為酸辛保和唐有易𤣥子吏隱己多年由來積隂德竟爾成神仙蕭闕題思詒齊溫溫經尺璧寶之無不至盈盈一杯水捧之惟恐墜人生七尺軀負抱良己貴欲思淑厥身當須奉名義五陵豪少年昂昂多意氣不圗顯揚謀聲譽只如寄栖栖陋巷人簞瓢或弗繼動履不忘親令名日昭㫼置器且求安保身豈無計載歌思詒詩令人發長喟灌陽懷古灌陽翳頽城清湍夾荒廛居民數十家烟火何蕭然停驂問民俗共言苦輸邉捶撲無完膚逋租動纍千憶昔吾逺祖所至人共憐曽來守是邦煩苛隨時蠲既除威茂運且息官貸錢惠愛民不忘姓字人能傳兹來訪遺迹荏苒三百年仰探撫字心皓雪凝山顛奉陪安老致政先生游南莊作溪回村落虛山迥川原曠草堂工茍完嘉疇君所貺是時收穫初聯騎遙相訪東郊騁遐觀西鄰薦新釀酬酢衡門間徘徊土橋上風俗栗里侔景物輞川抗行辭玉筍班來作山中相豈無戀闕心亦有眀農望進退荷恩榮眷焉期夙尚喜聞胡伯尚至而作十年金石交千里雲山隔秋空鴈冥冥夜雨情脉脉平生蓬蓽資區區二三策疇能了此心非子將誰白好音從何來雲舉雙鳬翮眷言遂情素豁若千金獲和嘉猷林先生韻膏車届岐路控靷將何之周道固匪遙疇能適所思曠懷隘千古滿腹撐羣疑多子藹髙誼抗論豁我眉沉吟北窗下不見知心人牆角有寒梅冰姿出塵氛對之有佳趣侑以酒滿尊嘯傲萬物表皓月生嶙峋我久客西川子來自東吳成此萬里會幸得一尺鱸苦乏尊中物旋解腰間魚對面不為樂别後徒緘書懷人夜無寐坐聽寒漏息斜月下梧桐餘輝欺曙色斯文豈無屬遺緒會有適眷言重自珍相期固金石升仙橋别林嘉猷二首端居闤闠中有耳若無聞匪曰病聾瞶至道莫豫陳有媺古君子來自東海濱丰姿挺梧竹卓見超嶙峋髙論兆眹究浩懷雲夢吞連床吐深情翦燭談斯文噲噲孤鳳凰犖犖真麒麟可致不可羇我心尚伊人身度升仙橋言送凌雲客駿馬簇游龍華車集芳陌長揖臨路岐相看情脉脉憶昔題柱人才華冨籌䇿風雲相際會聲名隨烜赫顯揚丈夫事尚恨所志窄慨想有深情非子吾誰白别王仲修闕繼志齊集卷一
