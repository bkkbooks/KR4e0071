body:
  text: 繼志齊集卷五明王紳撰論裴矩論甚矣人心之不可以不正也以一已言之固吾身之本推而言之又國家天下之本也茍能守之以正則萬善出焉用之以邪則衆惡鍾焉堯舜桀紂顔曽盜跖同此心也同此理也而其所以不同者守之異而用之殊也是故君子守此心而循此理信乎若四時之有常也昭乎若日月之明也確乎若金石之堅也萬鍾於我何所加鼎鑕於我何所屈於是以之立身則餓於首陽山而不以為困天下之人非之而不以為非以之事君則剖心為奴而不以為恨佯狂吞炭而不以為辱又豈有隨其所寓而施之者哉豫怪裴矩當隋煬昏侈之君揣知其將有志於逺略則撰西域圖記逢其志而說其征髙麗以致覆三十萬之衆罷中國之民卒底於亡滅及仕唐見太宗志在容受直言欲殺一貪吏則能面爭而以正規之時奚趨向之不同也夫何司馬溫公猶謂其佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠若然則吾之所守者在乎君而不在乎我矣是所謂蹇諤之風惟可施於眀盛之時而諂諛之計乃行於昏亂之國遂使聖者愈聖愚者愈愚又何用夫扶傾持危拾遺補闕之職哉豫嘗推矩之言其佞於隋者僞也其忠於唐者亦僞也彼時見太宗英眀睿斷非可以世故惑故假理義之說以中之亦猶向之逢煬帝也夫不可必遇者時也不可暫易者心之理也吾心既合於理時之遇與不遇又何恤哉今矩之心若下阪之丸遇㠌欹陂險之穴則隨而陷之遇平易坦蕩之道則歸於正其所守者為何如哉故其幸遇太宗而得一陳其盛說設使之終無所遇而終事煬帝則亦終其身而為狗彘之行以並於虞世基宇文化及之列矣又安得太宗之美譽乎此豫所以嘆人心之不可以不正也或謂百里奚之用於秦豫讓之死於智伯是亦遇歟曰不然彼顧其用與不用耳若矩者既已儋其爵而析其圭反進諂計以搆其禍又可同日而語乎哉盤庚遷都論古之善治天下者必謹於常情之所忽略重於民情之所難違豈不以忽略而不加察禍患之所由起難違而固欲違之民情之所由怨者乎中天下而立制四海之民言出風從令行響應彼蠢蠢之氓微劣愚昧跧伏於草莽之下其心畏之若雷霆鬼神之不敢窺測尚敢揚眉出氣以吐所懷哉此常情之所忽而易者賢哲之君則謹而重之欲使之也若承大祭見其顛連也若身受痌瘝開其麗而輔其生匡其心而翼其性此其德澤入人之深厯數十世而不忘者也豫讀盤庚三篇而知其德之所以盛者商之都耿圮壞已甚盤庚閔齊民日入于墊溺故欲遷于殷夫以天子之尊制人短長之命其拯人於塗炭亦易易耳而大家巨族安土重遷反以浮言相扇彼盤庚者不以民不順已命為怒唯恐我之不順其情為憂丁寧告戒引咎自責不啻慈父之於愛子既敷陳其不遷之害能遷之利又且抑其非心導其善行用哀矜惻怛之意代捶楚斧鉞之刑其後民非不遷也而遷於人情之所順雖不能快愜一時心意其所以纘先業埀後緒者非此不足以中興六百年之業也而世之論者固以先王動民而民不懼勞民而民不怨以病之嗚呼不亦求備之甚者矣漢文帝論豫觀文帝恭儉仁慈可謂漢代之賢君矣然而獨闕於眀斷何哉於絳侯周勃之事而深見焉夫勃鄙朴人也自髙祖為沛令即以中涓起從觀其披甲荷戈攻守戰鬭積銖鏤之功至封為列侯而食邑萬户則其忠勤之志已見于髙祖愛遇之誠與垂死之囑矣夫何瀕老而文帝以庸人之言遽疑其謀反至令下獄而侵辱於小吏茍非薄后之言幾置於斧鑕所見何其淺哉豫嘗考其先攻城破敵擁缺之勢者固不可勝數當髙祖之疾也命勃以相國代樊噲而定燕及事未竟而髙祖崩則勃之欲反豈非其時乎髙祖之崩也惠帝吕后繼殁而諸吕亂勃以入據北軍而攻諸吕天下之勢皆歸於勃則勃之欲反又豈非其時乎勃於是時既無謀反之意乃為漢代社稷臣易少主而立文帝則其忠勤之志義襮於是矣而文帝又何疑哉然文帝之立勃之恩為大以大恩之人而欲訊之以大罪仁德良虧焉雖然宗社之寄非輕而人心之微難托受天下之任固不得循一人之恩而妨大事理之常也所可恨者獨闕於眀斷耳昔太甲不義伊尹放之後太甲悔過而不疑成王幼冲周公相之三叔流言而成王不惑後漢昭帝以少孤而繼大位霍光為輔燕蓋上官譖之而昭帝能為之辨是三君者皆以稚童未練世故者也特中心有明繼斷然而文帝既不能效三君之為又獨不缺婦人之志吾不知其果何見耶昔蕭何樊噲建不拔之基業而髙祖猶或繫治於獄或欲即斬軍中豈其習性而然歟賈誼所云流涕太息者當有為矣漢元帝論漢元帝時御史大夫缺羣臣皆舉馮野王行能苐一上以問中書令石顯顯曰九卿無如野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢私後宫親為三公上曰善吾不見是乃下詔嘉美野王廢而不用論者曰君臣好譽而惡毁賢愚之通患也然則賢者恆志於大而不局於小愚者則急於小而忽於大其故何哉蓋大者難行而小者易致小者易辨而大者難明也是以蓋世非常之功恆出於聖賢有志之君而煦煦姑息之為乃見於委靡因循之主孰知行其大者而小者不求自至行其小者而大者為尤急哉余嘗較之避賢與退不闕其為君子乎公孫𢎞以老年為丞相封列侯食邑數百户而躬為布被脫粟之飯武帝下詔褒其漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者也後世不察遂從而稱之以為故事嗚呼君子自修之道蓋亦盡其在我者而已何必區區求異以為髙哉自昔君子莫過於周公孔子而周公位總宰定制度貴賤異等老幼異養文物粲然廢一不可孔子亦曰儉則固是儉者非聖人之中制也不得已而後為之耳今𢎞祿俸足以給貴齒足以享而甘减其口體雖至愚之人亦知為釣名而欺世也不然是周公孔子之言行不足法而儉乃理之正歟何𢎞以老年極貴而自奉之薄也或曰𢎞自奉之薄蓋中心有所守不以富貴易其養故自處如布衣時耳初何求聞於人而謂釣名欺世哉曰事有任意徑行而自中於理者有用心模擬而不勉人之知者及其至也如見肺肝然若𢎞者可見矣曰自古聖賢多以菲薄自奉若禹為天子而卑宫室菲飲食而致力乎溝洫鬼神是亦過歟曰此蓋任意徑行而自中於理也夫禹豈直若是哉甚至過門不暇入娶妻産子而不及字何則當是時也上受天子之命下濟生民之溺謀度計畫且忘寢處豈以宫室妻子云乎哉是有故也若𢎞者操數寸之闕管書盈尺之闕位遇承平之世守已成之法以遵職而己未聞孜孜於聖賢之道成大功立大業如禹之過門不暇入娶妻産子而不及字也乃獨於布被脫粟之飯以自現此非用心摸擬而不免人之知者何耶曰當此之時既無洪水之害且藉世承平故得安其爵位故將減所奉以與故人賔客共之是亦仁者之心也然其設心若此又豈用心摸擬之為哉曰仁者無偏愛而有泛愛之心茍謂𢎞推仁心以待故人賓客則在下者當兼受其愛矣又安有殺主父偃徙董仲舒之謀哉於此益可見其心深忌而多詐夫心深忌多詐乃獨以菲薄徼譽又豈非孔子所謂索隱行怪者耶曰然則𢎞將不得為君子歟曰要之為聖人之道固未免無罪若以後之踵其位者儕之則𢎞尚為中人乎哉田橫論士之事君能致其身而不吝其死者固難君之能得士而結其心者為尤難夫君臣之際勢甚殊而禮甚嚴也分甚疏而道甚異也於其間乃欲望之為股肱而致生死於一命茍非煦之以深仁懷之以至義其可强而為哉是故紂行暴虐而億兆之臣離心離德武王身履仁義而三千之臣皆同一心豈紂之臣稟性俱惡而武王之臣性皆忠歟蓋亦顧上之遇何若而應之耳雖然豈盡然哉固有上遇之如父子至親而下懷二心者比比而是若漢之韓王信彭越黥布盧綰陳狶者其人歟此豫所謂為臣而致其身固難君之能得士而結其心為尤難也秦失其政天下豪傑並起百姓紛趨惟勢利是尚朝受深恩而暮懷背叛晨立盟誓而夕歸權勢若風翻雲合無所定向者何限惟田橫兄弟起齊宗室間繼立為王及其敗也遂率其徒五百人居海島中髙祖即位聞而召之再四始至既至復自剄二客從之者亦隨而自剄五百人聞之亦皆自剄嗚呼何施而臻此歟夫五百人之生也具五百人之性聲音笑貌莫能同飲食嗜欲莫能同而就死之心乃同豈人之常情實惡生而樂死哉豈其勢迫而威促之哉蓋出於其心之所感也夫許人以物尚或靳而不與今乃捐軀以與人則夫橫之所以致於五百人者為何如而五百人之所以報橫者乂何如哉當秦之世借父耰鋤而矜德色母取箕帚而致誶語甚至子弒其君者有之而五百人者未聞有卓立瓌竒之行名藩巨鎮之寄乃能若是其視夫韓彭輩沐深恩而成大逆者可同日而語耶雖然橫以困窮率五百人遁去而五百人皆能死之借使橫得位而宰羣臣其能下武王之三千耶由是論之五百人之死橫也固難而橫能致五百人之死為尤難雖然君臣之相感如此固宜有天下而卒不有者其亦命也夫陸贄論智足以窮天下之變故而不能保其言之必用德足以動主之敬慕而不能信其道之必行其故何哉蓋在我者我可得而致其力在於天者雖聖賢不能違天而强取況君子乎當周之季王道湮微列國諸侯爭雄競利以取强弱於反掌天下之民嗷嗷望治者亦久且衆矣時若以孔孟之賢假之以輔相之位立伊周之績易易耳夫何天未厭亂竟使其栖栖焉皇皇焉逐跡於魯衛齊梁之間有見其儀刑而樂告之政事者有欲以中國而授之室者然卒無所遇豈其智不足而德不周歟梏於天而莫之能為也每嘆李唐屢經女主之禍三光已晦而復眀宗社既危而再安至德宗之時亦已極矣夫豈無撥亂反正之才出於其間以應世用哉蓋在有才而不能用用之而不盡其才也嘗考陸贄以聖賢之學經濟之具擴忠推誠蹇蹇諤諤當國步俶擾之時君臣否隔之日於天下之事無不知知無不言言無不當使德宗能盡聽之則奉天之幸未必見而興元之奔必不舉矣雖然贄之職厯近侍而大拜矣位非疏逺也贄之言施之於事而參密謀矣計非全不用也觀其論李萬榮要君逐帥不當授以節鉞所以正亂世之綱常辨李楚林棄逆從順不可乘機詐取所以安天下之反側奉天罪已之詔則唯恐其言之不切而行之不果慮藩鎮之跋扈則力諫以推誠待人誠國家之蓍龜救時之藥石也故德宗雖甚猜疑至於理到之言不容不服孔子曰法語之言能無從乎改之為貴巽與之言能無悅乎繹之為貴及考薦李巽於前業已許而更用者乃在辟戾之裴延齡論臺省舉吏章已上而蒙嘉納矣卒格而不行於是知夫德宗用其一二者非誠心素志也外則迫於臲卼而贄之言克中於事情內則秉彜好德之心人所同然而贄之賢簡在人心者非一日也其後大憝既除而怠心漸恣私欲已熾而良心鮮終於是平昔施之於人者稍稍見加矣孔子又曰賢者辟世其次辟地其次辟色其次辟言是故醴酒不設非有大故而識者已知為髠鉗之漸贄不接淅而行猶徘徊顧盼兾其庶幾乎改故卒及於辱於是陽城之諫雖切而忠州之行已決矣且唐之稱賢相者若房杜之功業魏徴之諫爭姚宋張韓之政事不惟無其人求其學術之懿識見之正唯贄一人而已庶幾董仲舒賈誼之徒歟而其見於事功者僅如此豈非天哉故世之論者謂其能順天而揆事獨不能順天而處已豈過情也哉序遜志齊藁序天之生斯民也又必生聖賢為之依歸以裁其有餘以補其不足必使暗者資之明懦者藉之强然後天地位而萬物育也然而伊周孔孟之徒不世出者非天之惡生聖賢也蓋聖賢者靈和純粹之氣之所鍾實未易逢也茍生矣則將行道於當世垂訓於方來雖其一身之微其功已被萬世之逺矣夫萬世之後有讀伊周孔孟之書而慕效之者可不謂之豪傑之士乎雖然聖賢任道之心雖一而行道之勢則不同伊尹周公得志而見於功業孔子孟子不得時而托於空言其事雖殊要其歸則一也後之學者不察其心而離為二端専功業者則詆立言者為空文務立言者則謂必藉是以明道傳襲之久而弊愈甚嗚呼世有不惑於衆人而致力行之功者其殆有志於聖賢者歟天台方君正學負精純之資修端潔之行考其學術皆非流俗所可及其言功業則以伊周為凖語道德則以孔孟為宗會其通而不泥於一志乎大而不局於小實有志於聖賢者也嗟乎聖賢之不作久矣斯道之微若晨星之在太空光彩不耀者數千百年至宋諸大儒出始續其不傳之緒而繼之然後學者有所宗師今去宋又二三百年矣斯道之晦亦久矣天之閔斯民而望後人者亦甚矣方君以出類之才如此其意必有在矣而君又烏可自不力也紳不敏幸忝同門之列於君之志切有與聞焉故特著其說於文藁之首聽琴詩序今人所以不及於古者非天之降才不同也為之防範者闕其具為之導養者失其宜外之則靡然承習不知所以立內之則侈然放肆不知所以檢由是去古愈逺而人才愈降也孔子曰興於詩立於禮成於樂是則樂之所以防範導養而能納人於中和之地者尚矣故禮記亦曰君子無故不去琴瑟而琴者非君子之所當用心者乎天台章氏同吉精於琴嘗挾所能至蜀蜀之士子類從而習之甲戌季夏遜志方公與客坐於禮賢館坐席初定明月徐升同吉厯階而上布几焚香援琴鼓之連及三終薰風南來天籟逸發恍乎羲黃不知其為逺虞夏不知其為古而周情孔思並陳疊奏忘其出於數千載之上也嗚呼古人往矣不得而見之矣尚於斯而有徴焉則夫琴者豈非君子之所當用心者乎豫方病夫人性之偏而不能慮過而不能防遂致終為失德之歸今聞遺音之有在實足以蕩滌邪穢流通精神矣是闕感知遇之深視義理之精微性命之𤣥奧知無不言言必中節及承教㫖有所述作尤研精覃思必歸於正而後已若先生者可謂間世之英才士林之宗工矣然其道豈止於一身哉乃邦國之華也紳也辱先生之知最深且久於其還也士友咸賦詩為餞故紳特明其志述其學而為之序云盤石書舍詩序自昔名賢君子所以道成德就者必鍾夫山川之氣以生又必有藏修養晦之所而造其業蓋不清淑以孕秀則無以資其性之靈不有其所則無以凝其性之定此理之自然也惟蜀之山川竒峻甲天下故往往産名賢出巨公為天下後世之所景慕若漢之揚子雲司馬長卿宋之張敬夫二范三蘇魏了翁則其人也自豫游蜀者凡三載每遇佳勝之境必徘徊顧盼挹其景而想其人切意夫氣運之流於穹壤者無窮期而清淑之鍾於人者又豈獨嗇於今哉未幾臨卭張景山甫以盤石書舍詩文見示皆一時名人髦士之所述作乃知景山甫之所以司教百里而造就多士與其吟詠講說可以表於蜀人者蓋有以致之也雖然豫與景山甫相處者頗久而足迹未嘗一及其書舍今獲目其圖味其詩而益知景山甫之處其間也林姿谷態之出沒左圖右史之施陳燁乎金玉錦繡之華不足以奪其志也青燈夜雨之寥閴朝經暮史之窮搜紛乎管弦金石之樂不足以動其情也於闕聞君子之於仕也不以位之崇卑為意而以道之行否為憂其道行矣抱關擊柝又何為愧道之不行位加卿相秪益纍焉是以孔子大聖嘗為乘田委吏亦曰牛羊茁壯會計當而已矣豈有他哉故其言曰君子思不出其位其是之謂乎今仲廣居出納之職行出納之事稱其職盡其事則君親之恩由此以報幼學之志由此以行况衡州既為時齊宦游之邦而司倉又若聖人所厯之任仲廣行矣訪遺老以思紹於家聲素其位以求於斯道如是足矣否則非吾之所望也仲廣臨别來徴言因舉平昔之情與今日期望之意以為序素牡丹詩序上清宫道士鄧如如自其師祖芝山俞煉師植牡丹一本於所居三華院至癸酉春花始盛開其質雪白而玉潤人頗駭觀之凡能言者遂為歌詩以侈美其事既成卷而未有為之序者會豫過山中如如稽首請豫文以辨其端嗟乎凡物之賦形於兩間者其妍蚩纎巨固不同至於人之好之惡之顧在所遇何如耳使其托迹於仙宫梵宇名園勝圃者雖一卉一芥之微自足以聳人之玩好茍其生於田家野落縱有異萼竒葩殊芳絶質亦無為之意者矣若兹花者其然乎雖然世之論牡丹者若姚黃若魏紫若夀安輩亡慮百十種見之於詩人品題著之於名士之花譜莫不誇侈其艷冶魁偉耳及求若此花之娟潔者又何闕以其父執中先生與先公有舊且為製烈婦傳及修元史而先公又司筆削之柄契誼為最深因請文以繼其後嗚呼若上人者可謂善於繼述顯揚者矣紳聞大雄氏之書有報恩等篇其說固可得而求之矣上人既已得之於彼又復求之於此益見其孝思無窮也韓子有言莫為之後雖盛而不傳其上人之志矣嗚呼若烈婦者豈待文辭而後傳哉送景山張先生赴京序豫讀歐陽文忠公榮鄉亭記知昔蜀之郡縣胥吏不喜儒士每見輒為其毁辱搆陷以故人不樂業儒亦不急於仕祿甚有志者不過習訓詁歌詩以自養而已未嘗不歎其習俗之鄙陋而士氣之委靡也士生其時處其鄉能拔擢奮勵以自見者其亦得十一於千百哉今去其時未久餘風遺習豈無存者顧在作興之方與自立之志何如耳臨卭景山甫張先生蜀産也自其少時慷慨有立志習詩書六藝之文即圖為世用後罹元季兵興浮沈里閈以保全性命者五十年國朝文運開始日以求賢為務遂應有司之辟入成都為司訓居職九載所教弟子多所成就邑人稱之迄今考滿將赴天官核績而景山甫之顛髮亦已種種矣或謂景山甫習蜀土之俗近納祿之年且負痼疾必將乞骸骨而歸故鄉曝茅簷凉竹簟以樂夫崦嵫之境設使之任職臺閣寄牧州郡必非其志矣豫謂不然昔馬周以晚年而見遇汲黯以多病而卧治况當盛眀之時為士者孰不欲竭心展力以希尺寸之功而圖芳於竹帛尚何有習俗之移人乎吾知景山甫且將推其所有以自效庶幾不負平昔之志異日年益髙而業益成致政以歸指某丘某水之舊遊盤桓桑梓以保夫天年使人稱其生為鄉文人沒為鄉先生則豈非景山甫之志願哉豫與景山甫遊且相知故本其心為言以贈之而并以廣或人之所見劉大有詩集序夫詩者主乎理而發乎情性者也天下之理無窮而人之情性不一為能不失於理而得乎情性之正斯足以言詩矣何必鈎竒衒怪如牛鬼蛇神之不可以狀詰屈曲聱牙若殷彛周卣之不可以意求者乃謂之詩哉嘗聞嚴滄浪論詩體者五十有六有以世代為一體者有以年歲為一體者有以地里為一體者有以一人為一體者何其屑屑之多體哉殊不知造化之理無窮而文章亦為之無窮譬之聲音笑貌人人不能皆同獨言語可以强同乎哉是故淵明天性冲曠而得於渾然東野厄於困窮而得於寒苦政自各類其人夫何世之談論者往往欲缺體或謂體備諸家是猶刻舟而求劍俯地而捉影愈勞而愈逺矣抑不知諸家之體其能外三百篇而出於六義者乎茍其不然曷亦宗三百篇本六義而出入於諸家之為愈豫有見於此者久矣而未遇知己者為之道也丙子之春豫邂逅劉大有於滇陽一見握手歡若平生未幾出其平日所作詩數百篇見示豫閲之纍日見其犖犖有竒氣而凡措辭命意皆不茍誠作者也間嘗與之論議詩之為道大有益以豫言為然因徴文以序其首簡時豫以情事未伸心志欎欎若酲人故諾之而未及為暨還成都追思故人逺不可及且以前言之不可食也故舉豫與大有所嘗論者以為序大有其終以豫言為然耶玉壺詩集序世稱司馬子長好游故其文有竒氣夫游烏足以資乎文哉良以山川清淑之氣經之於目即㑹之於心會之於心即形之於言所以言必瓌偉而雄麗也蓋人之質性厚矣問學富矣其得諸內者至矣必藉夫游覽之勝以資其外然後吾之氣內外交養者有其素於是縱橫上下大小長短輕重疾徐惟吾之所欲言矣豈特如其所欲哉雖吾亦不自知其所以也如是而有不竒者幾希古之詩人其作者厯厯可數然未必皆出於此其得於此者若淵眀之嘯傲物表子美之經厯艱關太白之游情世外可勝紀哉金華至剛滕先生結廬玉壺山中讀書積學不務外馳自其少時喜放懷於山水袖攜青囊書薄逰逺近與人談論甚歡洽而又未嘗泥於其術間有所得即發於詩歌跌宕為可喜如此浮沈者五六十年迄今用薦者出為郡庠弟子師所教多成就今年以校文徴又蹴錢塘遡淮泗厯大梁絶黃河覽華嶽之崇髙閲關輔之雄壯登棧道入益門而抵巴蜀挹岷峨之秀俯大江之流故其所得益多所出益富豫評其作若春空層雲變幻百出秋漢飛隼動輒如意非得諸內而資于外者能乎豫病夫不能詩者久矣今得先生之什觀之若酲者之咽氷雪精爽為之開豁况居同一郡而胥會於萬里者乎緣序先生之所得使讀者知有自焉范氏族譜序人之所以異於禽獸幾希者以其有尊祖敬宗之心知親疏長幼之序守禮義仁愛之節也春秋祭祀思其所本骨肉隆睦思其所親倫理不失由乎天性人之道也然而世人莫不知之亦莫不欲行之夫何見其能暫而不能致久見其能久而不能及逺髙曽以上祖妣之名或不知也緦免以外尊卑之秩或不辨也如此而望其盡乎人道不猶捨隄防而求瀦水之渟􅀈不散有是理乎是故先王制為軌俗防範之具設小史之官為世本之書至漢有鄧氏官譜應邵氏族篇宋何承天姓苑唐貞觀氏族志元和姓纂路敬淳姓略栁冲族姓系録及諸書既廢而世之欲論氏族别婚姻厚風俗扶世教而族譜所由興也嗚呼士之有志於古而欲惇禮義者捨族譜何求焉華陽范氏之族乃宋蜀公鎮之裔自蜀公而下至十世孫煥卿厯厯可考也煥卿之子彥良益恭謹父子纂述而成其書於是數百年之文獻十餘葉之衣冠近而父子至親逺而疏逺末屬藹乎見于方冊之中矣昔程正公謂管攝天下人心收宗族厚風俗使人心不忘本須眀譜系其信然矣且夫人之譜固然而為賢者之後又有其說也是故因其譜以思乎祖思乎祖而景其德則顯揚繼述之志與孝弟惇篤之行其不相感而相生者乎吾聞蜀公在熙寧間其剛毅果决之氣正大公忠之心雖使之亘天地而不磨可也故世之志士仁人聞其風者猶且慕之况為其子孫者乎此范氏之譜所以與衆異也嗚呼尊其尊而親其親吾讀斯譜而有望於煥卿之賢父子矣楊宗彛詩集序丙子之春豫以情事未申將抵南詔道經于普安適宗彛楊先生過豫於官舍宗彛會稽人也與豫為鄰郡然而宦遊四方者二十年豫又迫於騃稚故未之識及豫入蜀始稔聞其名今復胥會於萬里外遂握手歡如平生繼出其所著貴竹槀為示豫讀之纍日愛其音韻沈雄體裁嚴正流麗而不至於放平實而不失於俚殆有古作者之風焉故自其平生出處厯履感遇悲喜一發于詩以寓其志且請豫序其端嗚呼夫詩豈易言哉自三百萹而下厯漢魏晉宋以來至於唐於五代於宋元作者不可以數計而以之名家者百不一二焉何則蓋工於辭者每戾於理而得於理者必嗇於辭况又因之以世運之隆汚氣習之衰盛格製之變易而態故百出無復古人之遺意矣此世之談詩者各拘於所溺之偏人或詰之則必指古人以自誣且曰吾學某者也嗚呼是猶學射於逢蒙而用其故鏃習醫於扁鵲而竊其遺方所謂得其末而遺其本若此者是可以言詩乎哉豫患乎此者久矣今觀宗彛之作固足以一洗盲瞽之病苐恨世之知宗彛者尚少而豫言未足以取信於人也雖然任恭惠公有言石韞玉而山輝水含珠而川媚若宗彛之詩豈終泯者耶世有采歌詩以偹盛朝之風雅者尚因豫言而有得矣贈鄒公瑾序木之養厚者發必豐水之流沛者源必逺千尋之材可以就繩墨而充棟梁者必其資雨露之深而埴土地之廣也溟瀚之水蕩日月而含雲煙者必其納百川之流而居卑下之地也君子學以至其道者豈外是哉夫君子莫不與人同者顱圓趾方目視而耳聽飢食而渴飲殊不異於途人而途人者羣羣焉草木之生泛泛焉浮漚之沒其生其死初不為之重輕也而君子者以七尺之軀欲配兩儀而三之人君至尊也吾思致之為堯舜萬民至衆也匹夫失所若已不得辭其責者聖賢逺矣其道之在已若躬承其重焉夫如是非其妄也天之命於人者無不備而人之受于天者無不周也君子知夫道之當如是也故雖厄于陳畏于匡而孔子不以為憂不遇於齊毁於臧倉而孟子不以為歉彼豈不欲自安哉誠以吾分內之事有不盡則愧于天矣有愧于天者多則與途人等矣此君子所以貴於學而學必期至於道也雖然自灑掃應對等而上之至於窮理盡性無非學也學焉無不至也所謂養之厚而流之沛也若夫剽竊以為功而不尋其本涉獵以為美而不究其源不猶樗櫟之質用之不足以勝斧斤涔蹄之蓄朝滿而不夕除者幾希歐鄉鄒公瑾氏以簮纓故家且少聞庭訓其志篤其才敏自弱冠即知所當學然而不安於小成歲甲戌豫胥會於古渝與之論議落落可喜自是凡三會㑹必握手劇談而知其所學益以進今年春來遊於成都成都士皆願交之留三月告歸衆咸作詩以為餞豫與公瑾交也久故特本諸君子之所當學者以相勉素行齊詩序所貴乎君子者以其心有所守而不役於物也心不役於物則加之富貴而不以為喜困之以貧賤而不以為憂處之忠難而不以為懼居之蠻荒而不以為恥蓋其自待者重而外物舉不足以纍之也是故箕子封朝鮮而化行於邦國孔子厄于陳畏于匡而絃歌不休顔子簞瓢屢空而不改其樂孟子加齊之卿相而不動其心彼聖賢者以為天之所賦我者健順五常之性而已所謂命也遵吾命而行其於禍福窮達之及於躬者不啻贅疣之附身蔦蘿之依木皆為身外之物烏能動其中哉故傳曰君子素其位而行不願乎其外也嗚呼非有志於道者奚足以語此哉番易朱可璵氏疏通而特達蚤游湖海間困悴無遇不以為憂也及壯至蜀乃以才自見賢王聞而召之俾授句讀于武臣之子弟且日與諸帥講說史傳而其心不以為慊也嘗扁其居齊曰素行時之名公髦士或為文或為詩以紀詠之可璵屬余序其首余惟世之所患者在乎居卑賤而慕髙大處崇極而志汚下慕髙大者必致於患得志汚下者未免於患失患得患失之心交於中而素行之實喪矣今可璵厯窮通遇險夷一致如此其得諸素行者可知矣豫故復要之以聖賢之道而告之抑余方志於自守而力有所未至者可璵尚能以其所得者復以語我乎哉鴈塔棲雲詩序浙左七郡惟睦多山川睦之分陽有山曰鴈塔鍾一邑之秀當其重巒疊嶂攢峰峭壁喬峙掩映于左右而鴈塔獨巋然據其中用是人多樂玩而即之山之麓方氏世居焉方氏為邑之衣冠望族自宋元以來多以科第致顯庸有號菊隱者兄弟聨第為名進士至其從曽孫文字用中自幼以俊秀選入邑庠為弟子員嘗於其家闢室以為藏修之所因扁曰鴈塔棲雲士大夫多為記述之者後業成貢于南宫復入胄監未幾朝廷遴選練達通眀之才行御史事俾稽核天下百司之案牘用中以選得四川藩閫諸司逾年事集而歸人皆道其能豫時佐教成都知之為詳及豫以薦者召授國子博士用中因持卷求文以辨其端豫雖不目擊鴈塔之勝然記往年舟經郡下嘗顧瞻其林姿谷態猶髣佛于中也夫雲雖觸石而生膚寸而起及其至也氤氲靉靆不崇朝而雨於天下其功誠大矣然而君子幼學壯行者庶將以成已而成物也不其若雲乎昔用中讀書鴈塔下見雲之來棲豈不曰是雲有澤物之功而常依于我我欲力學致用處於雲之下其可以不如雲乎今既出仕于朝則又豈不曰昔雲棲於鴈塔者無定形而吾身之居于鴈塔者無定跡缺焉吾身奔走于外而雲常往來于前是吾身雖不在鴈塔而吾心未嘗不因雲而興懷于鴈塔也嗟乎此用中之所以善託物引意用志於髙逺且將行其所學以及物也歟若夫鴈塔之竒偉棲雲之變態已見於諸公之述作者兹不復道送鄭叔貞序洪武丁巳先師太史宋公致政家居于蘿山紳始弱冠以契家子獲執汛掃役于公門公不鄙汲引而誨之每賔客散後列弟子坐松濤室下厯數古今作者必曰吾於交友所見惟爾父一人而門人輩獨希直而已希直即今侍講正學方先生也紳時騃稚未知所云而識者知公之言為至論後二年公卒于蜀先生東歸天台旋出教授漢中今天子即位首召入翰林而名益著聞天下是時登先生之門者雖甚衆有若鄭君叔貞者先生里中子也資稟清粹力學好古為文辭如春空層雲變態百出如秋江長濤渺漫無窮非其才氣之贍固不至此然叔貞雖不事表襮而其聲譽已藹乎縉紳間今年叔貞侍先生入亰居數月念定省之職久曠惄然興懷促裝將還故里紳方以召命至相與周旋者信宿將别因為言曰夫天下之物成之難者器必大器之大者用必博萬斛之舟非尋丈之材一日之功所能為惟夫材良功就而成器也則必以之駕於長江巨海之上驚飇復浪之中而利濟之功大矣君子之為學豈異是哉是故極天下之書無不讀盡天下之理無不明藴諸躬者極其備養諸內者極其充於是以之齊家則家齊以之治國而國治以之平天下而天下平其設施布置豈庸人俗子所能窺測哉昔范文正公修學於泰山已有當世之志及出而用皆能行其志者闕繼志齊集卷五
