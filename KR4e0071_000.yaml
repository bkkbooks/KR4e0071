body:
  text: 繼志齋集别集類五明提要臣等謹案繼志齋集原目作十二巻明王紳撰紳字仲縉義烏人待制禕之仲子明史附見禕撰稱禕死時紳年十三事母兄敦孝友長博學受業於宋濂濂器之曰吾友不亡矣蜀獻王聘紳待以客禮紳啟王往雲南求父遺骸不獲述滇南痛哭記以歸建文帝時用薦召為國子博士預修太祖實錄獻大明鐃歌鼓吹曲十二章卒於官王泌東朝記以為成祖召入翰林編摩太祖實録者誤也其集殘缺失次僅存九巻而第一巻所載鐃歌即已全佚其他㫁簡缺文不一而足特以其為名父之子又師承有自其文演迤豐蔚不失家法詩亦有陶韋風致無元季纎穠之習在洪武建文之間尚可卓然成家雖一鱗片甲要非凡格不以其缺佚棄之也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀繼志齋集原序余嘗論先秦兩漢之文章所以為至者盖其人皆豪岸魁壘有傑出之才而負超軼邁往之氣故其文章足稱其中之所有若屈原之沈鬱賈誼之閎通董仲舒之純茂司馬相如之瓌奇太史公班固之雄深雅贍皆絶出百代之上而王褒劉向揚子雲之流亦皆奇傑詭異卓然各自名其家後世雖有善作者亦莫或之過焉余以為其時雖由其近古然亦豈非其所藴蓄之深而然耶後之君子茍有志於文不可不蘄至扵古欲蘄至於古必其才軼氣充而後可幾焉洪武三十一年秋余以薦被召來京師官于太學未幾而金華王君仲縉亦来為博士仲縉翰林待制子充之子也待制公當國初時與其同郡太史宋公景濂俱以文章名天下心常慕見其為人而未之能得也及與仲縉交始得其文而讀之為之歎息以為非今世之人所能及之也已而仲縉復自出其所為繼志齋集見其豐茂典則有追古作者之風盖能世其家之文者也因竊歎夫世之為文章者其才每不足而其氣又有所不充以故不能以幾扵古之人使能養其才而充其氣博扵取而深扵積則文雖不蘄於古而自不能不至扵古矣今夫江河之渾浩流轉而蛟龍魚鼈百怪之所聚山嶽之崇髙深厚而虎豹犀象百獸之所駭愕者以其積之厚而蓄之富也昔者君之先待制公與太史宋公皆學問博洽才氣超越觀其於六藝百家之書諸史百子之言網羅搜索無所遺漏而又本之以詩書之要故其發為文章馳騁變化縱驟放軼傑然追蹤先秦兩漢之間而不可以涯涘窮也君既以世家之學而又嘗游扵宋太史之門所聞者深而所積者富言論意氣逸發横出宜其有非人所能及者則其才氣之所至不旣深矣乎嗚呼可謂能不愧於待制公矣惜其仕不大顯扵時而遽賫志以没也仲縉嘗欲余為之序久而未之能復今仲縉不可作矣然朋友之義不可以終泯也故扵是書之永樂元年夏五月望日翰林侍講承直郎兼修國史廬陵鄒緝叙曩年余承乏國子助教首與博士仲縉王先生交先生酷嗜扵古選一字一句必煅煉而後出故其所作往往髙出倫輩流麗圎轉陶鑄乎韋栁之間晚唐諸子盖不數也然余奔走湖海三十年矣能詩者非一人知詩者則槩乎其未見也若仲縉者所謂知詩者歟惜乎用不滿其材年不稱其徳觀此詩者不能不發邈焉寡儔之歎也仲縉之子稌來京師執此帙求余一言故書此以告天下之賞音者焉翰林侍讀學士天游道者錫麓王達題
