body:
  text: 繼志齊集卷六明王紳撰序張母黃恭人孝節詩序昔宋蔡忠惠公年十八舉進士名動京師後知泉福二州而二親尚無恙閩人不榮忠惠之貴而榮其親之有子其母夫人年九十飲食起居無異少時母子眉髮皤然命服煒煌自後閩人之為子必以夫人祝其親為父母者必指忠惠以教其子暨忠惠事仁宗以讜言正色為時名卿仁宗嘗曰有子如此其母之賢可知特賜冠帔以寵異之至今三百年人道之灼灼若前日事洪武戊寅豫以非才召授國子博士始謁大司成寧陽張公顯宗瞻其氣宇魁岸文章議論磊落而閎逺未嘗不歎服之及退拜其母黃氏太恭人於堂上又獲觀其孝節之卷而有以知恭人事姑盡乎孝夫亡盡乎節嫠居孤苦而能保守門户以不墜且善教其子故公亦以進士三轉而典教於成均於是益羡閩母之多賢而仁宗之言為至論也恭人之行劉太史坦坦翁既為之傳自餘名公巨卿莫不喜聞而樂道之雍容長篇鏗鎗短韻殆且數十百首公慮其積久而散佚復俾紳為序作者之意以侈其美紳惟聖天子方隆孝治旌賢表德之命日下如恭人之事寧使其終泯耶切意仁宗所以稱賞忠惠之母者聖天子將取之以加於恭人也若然則閩人之子欲祝其親親之欲教其子者吾知其捨逺而指近矣姑書豫言以為其徴送栁原素侍親序昔唐虞三代盛時所以室無愁歎之聲而比閭樂時雍之化者以其通人情順物理而舉世無不得其所也家有耄期之親子弟終歲勤動而不得其養者無之非其志而强委迫遣以求備其所不能者無之志於養也不必望其致君自信之明也不必責其果於忘世泄泄焉衎衎焉上以誠待下下以忠事上不自知其身之囿於泰和之中也皇上嗣膺厯服以來為治一本於古視民如傷即拳拳於發政施仁恐一夫之不獲其所即屈法伸恩以全民命復念天下之士有登名仕版而梏於令者或不得遂其情愫故凡以省視祭掃為訴必優容而遣之嗚呼何其通人情而順物理邪烏傷栁原素氏向承鄉邑以人材薦上名銓書亦既厯事臺部而以敏幹見稱矣方將任用遽上侍親之請既得㫖乃告别於豫且求言以華其歸豫昔嘗過原素之家見其墟落深邃風俗淳厚繚屋皆良疇茂樹入山而樵泛水而漁其所資可不求以自足况栁氏奕世載德至其祖仲德處士其父良輔甫又皆以行義為一鄉善士人謂原素濡染家庭之訓出而用世豈不有過於人者而方且陟岵興懷重以吾斯未信為念懇懇請之故得翩然返其初服是行也上有以見朝廷方隆唐虞三代之治下有以見原素得盡人子之情雖然原素昔以才能而見擢今以情事而得免朝廷恩德之深為何如哉今兹之歸宜率先鄉里子弟而益修其孝悌忠信以為一家之政它日畢養而出移之於官吾見其駕輕車而就熟路決壅水以下長川也孰得而禦之哉送戚文鳴歸省序余少時嘗往來武林道經會稽登塗山臨禹穴慨然思大禹功闕太史公潛溪宋先生之門而獲師友乎今侍講希直方公當是時鄉里子弟以讀書業儒為諱吏胥一見人被章逢談文藝則拘執係紲强委以案牘焉少麗于法立致身家之虞余乃被短褐袖小冊晝入深密中讀誦或閉户夜就績燈以披閲途遇權貴人屏縮不敢近即近不敢吐一辭間以所得發為文若詩非神交心契者不敢使之知及佐教蜀郡始慨然與人論辨講說以詞翰相倡復今幸以虛名被召補職太學為國子師因以情事上陳于黼扆之前旋蒙聖恩渙頒贈官賜諡於是先公忠節久晦而復明而余區區自幼所抱之志亦少酬其百一也嗚呼以余幼之所遭也如此而長之所養也又如此今之所就固不敢望於古賢達士然猶克保先業而不失身於工賈之列者莫非祖宗遺澤流慶之所被也從子叔雍質美而氣溫志専而行篤能念家學之不可墜思發憤讀書以擴所未至今年夏閔余萬里入朝亟來省於金陵留逾月懼子職久曠請别而去余欲其鼓勇勵志於學故以所經厯者為告今叔雍有慈母之足恃也有兄弟之可依也有財錢足以資其身無患難疾苦之窘迫而其年又可致力也則其所就當比余十倍矣然非力行以求其至不幾於自棄乎書豫言使歸揭於壁以為朝夕之警送金華通判唐君序天下之事無常固有成於通而敗於泥者數車軌馬迹而行道吾知其非善御也按故方古法而投劑吾知其非善醫也昔漢武帝欲教霍去病以孫吳兵法去病謝曰顧方略何如耳不至學古兵法而去病卒為漢名將世之談治道者必曰古之循吏某人可以為師某事可以為法區區模其形步其武而切倣之於是有徇名而失實得其末而遺其本者矣其不為去病之所哂者幾希渠陽唐君克溫自胄監擢通守於金華郡之士友牟彥正等與唐君為同舍相率邀文以贈豫惟金華於浙左為上郡控數百里之提封總數十萬之編户自宋元以來為道學文章之淵藪故其俗淳而其政易以舉夫何近年為政之士談髙者或失於事實泥古者或短於適宜去髙古而志卑趨近者又溺於庸陋而専於漁獵煩擾之患求夫視民如赤子而以疾痛恫瘝為已責者十不一二焉以是政愈繁而民愈窮令愈嚴而訟獄愈不息噫豈獨邱民之罪哉自今聖天子嗣大厯服登庸俊良而畨易方侯以廉明愷悌著譽先朝而為之守又有山東蔣侯以才幹周敏而為之二於是振起廢墜修眀典章而政聲之美已達于京畿矣今又得吾唐君為之倅夫唐君被服仁義之言淹貫乎致治之道者久矣使行其所學以佐二侯之政吾知其同寅協恭隨時制宜而使七邑之民無怨歎之音老者得以養而鰥寡無告者得其情則足以副朝廷惠養元元之意矣何必蹈常襲故以為尚哉余雖官太學而家在義烏義烏為金華屬邑乃郡人也故於唐君之行不以頌而敢以規送乘大車住持乾明禪寺序佛法之初入中國本出於一其後去古而源逺遂析為三曰教曰禪曰律教學之盛有南山之宗有瑜珈之宗有慈恩之宗有天台之宗有賢首之宗禪學之盛則有臨濟溈仰雲門法眼曹洞諸宗律學則有會正之宗資持之宗其派既分於是互相矛盾禪則譏教之滯於名相教則譏禪之溺於空寂至於律學雖為禪教之所共持而趨向取舍亦各不同為其學者師異㫖殊各立門户不相出入有若楚瘠之視秦肥邈乎其枘鑿之不合也嗚呼世之圓頂方袍者何限孰能會于一而歸其本哉余居京師既久一日大車乘上人相過於橋門覿其容冲冲焉聆其語犖犖焉與之談其道確乎其有源也沛乎其知所委也詢其所自出則晦堂暹禪師之上首而余里中子也其至金陵為善世首座宗門諸老皆愛而與進之近膺叢林薦剡而捧檄出住西安乾明禪寺將行求言以為别余自束髮志慕家學即潜心於聖賢之道刓精竭思鞠明究曛以至于顛髮種種而不得其涯涘尚何能知佛法之閫域哉然念大車年方壯而志鋭譬猶平地任載之器其輪圓其箱方其杼澤其轅輗軸轂之材既良而馬牛服駕之力又盛使去偏蹊曲徑而由乎九通八達之衢雖千里不難到也顧在大車力行何如耳吾冀大車勵其鞭辟警䇿之志而環轍於二乘三派之間然後合衆說而底一會殊途以同歸俟他日倦遊而返方當舉吾儒之說以告之蓋有所待也大車行矣余日望之送樓教諭之瑞昌序赫赫之功易見而隂滋潜養之德為難名雨澤遍天下世所共仰也而不知膚寸之雲有以致之耳目之能視聽手足之能持行人所習見也而不知元氣有以運之國家混一區宇以來內而侍御臺部外而連州厯郡大邦小邑莫不得才而其事以不廢得賢而其治以成人見賢才彬彬輩出皆黼黻太平之具而為邦家之光然不知所以致此者固在乎學校有以育之也夫何世之論者視學校為不急之務而目校官為非要用之人甚而牧伯守令不識治教之相資固有挾勢而陵慢巧文以詆誣者矣於是居其職者自非深識卓見之士確然以師道自任安知斯職之重且貴哉同邑樓君宗逺以胄監生初授宜都教諭丁內艱服闋改授九江之瑞昌將行其友牟彥正徴余言以賁其行夫自皇上嗣大厯服勵精圖治即命廷臣各保所知以不次登用而校官多為識者所舉近之議者又謂此地為賢才所出之源不可以非人處之於是又重其選今吾宗逺束髮遊庠序之中壯而任庠序之職其耳濡目染者莫非斆學之事况其學足以眀體才足以適用其發於樂育之間固何施不可而待於余言哉雖然余猶慮夫習俗之弊視之為庸常故特推舉人情所易忽者以為告使世之為政者知賢才之出必本於此而不可以不重復欲宗逺知國家之所以任之者為非輕而尤不可以不自重也送張士𢎞歸省序豫向年宦遊西蜀見岷峨之山所産楩楠豫章其大十圍其長數仞倚嵌崖絶谷之中而不為匠石所睨見者莫不羡也後以情事未申上南滇道曲靖過黑松林長材巨幹森森數十百里不止切較其大者固足為棟為梁而小者亦不失為杗為闑茍非其居也得其所産也得其養縱不為斤斧之所戕亦安能致夫此哉因思士之為學何異於此是故士或生於偏州下邑無明師良友以為麗澤之資孤陋謏聞貿貿焉以自足者何限至於處都會之地日與賢俊眀哲為伍耳濡目染之所及雖欲無益不可得也太學生金華張士𢎞幼以俊秀入邑庠為弟子員洪武丁丑春充貢升胄監未幾奉朝命閲兵于廣東暨還會修髙帝實録以選給書札於史館搢紳每延譽之今年沿例歸省其親同舍友牟彥正等相率詣館下徴余文以榮其行豫方慨念士習之弊家居者或恃其抱負之髙而不求夫㑹同處大位者又不屑於下士而惟已見是用由是髙下乖隔聞見頗僻而士習為益陋尚幸太學者天下英才之所萃其猶楩楠豫章之産於岷峨松之長於曲靖居之既得其所産之又得其養是以棟梁杗闑之材無乎不備此豈偏州下邑之士欲望餘光而可得哉今士𢎞束髮陶鎔於鄉校業成而來游來歌視其所得固有以異夫孤陋謏聞者矣雖持此以為鄉榮可也然豈足為士𢎞之志哉必也行其所得而見於事功然後上不負國家樂育之恩下可以慰父母依依之望也書豫所見以為贈庶使士𢎞知所自釋焉贈龔員外序古昔治隆之世人見其化成于上俗美于下書于簡䇿又皆光明俊偉而可為天下後世法然豈偶然哉必其為君者負不世出之資而孜孜於圖治其為臣者自宰執庶尹百司郎署之屬無不賢且才君臣上下同寅協恭都俞吁咈于大廷之上而布其綱紀政令于海宇之間雖欲無治不可得也洪惟我朝髙皇帝以英武定天下三十餘年佐命元勳雕謝殆盡其壯强才濟之士猶彬彬也及乎今上新嗣大位又柬拔雋良搜羅遺逸列於庶位於是典章文物粲然可觀而民風士習亦皆思去浮薄入于淳厚而幾于古矣吏部驗封清吏司員外郎天台龔君子輿為人沈毅周詳言不妄發發必中于理自少善詩極清竒而未嘗以自見在職三年事無遺失皆稱其賢才今年循例得追贈其考妣以五品爵於是疏請歸省先隴既得㫖其友監察御史鄭君叔貞徴言以贈且曰龔君吾子所知者夫自三代以還有願治之主而無致治之臣有致治之臣而不際願治之主上以求於下下以求於上恆鰓鰓然而不相遇以故治隆之世不數見也當今皇上以天縱之聖守盈成之運宵衣旰食惠養元元而在廷之臣又多以賢才自致若龔君者既以賢才見稱於先朝復以賢才見稱於今日可為千載之竒逢豫故為序之使其鄉人知君之際遇非特為一家之榮乃所以為一鄉一邑之光也送太學生姚伯尹歸省序太學生三年一歸省國朝盛典也行則有言以贈之師友之誼也膺國朝之盛典承師友之厚誼負吾心所得而慰父母違離之懷天下之樂其有過於此者哉處之松源姚伯尹氏以俊秀游邑庠充丁丑歲貢今年以例歸省其母其從父惟深實同上舍邀其友葉資仁詣余求言以華其行豫謂之曰子獨不見夫垂棘之玉焉其性溫其德全其音清以越故玉人得之以為璜為琮為珩為圭為磬不事鏤畫而人無不以為寶也又不見夫荆氏之楸柏桑焉其質貞其理密其文彰故匠石得之以為輿為輪為几為榻為髙明之麗為禪傍不事髹朱而天下莫不以為美器也何則蓋存于中者既足不待外物以飾之也今伯尹以至美之質而樂育於庠術之中猶垂棘之璧荆氏之楸柏桑既遇玉人匠石矣何事於豫言哉雖然昔子路羣居講學其濡染於聖訓者非一日也及有他適則請言於顔子以為贈其亦以臨别之言意専而㫖約有為之語切要而意周者歟若然則余言不可以徒廢矣子行舟經吳江道秀水而過錢塘焉由錢塘而上抵金華厯永康而見括蒼焉錢塘為浙左之巨浸而括蒼為處郡之崇山其為巨浸者由其處卑而體虛故能納百川而不溢可為進學之方也其為崇山者由其居髙而積厚故能超羣峰而為一郡之具瞻可為修德之凖也伯尹其因之而致力焉無事豫言以為華也若欲序行役之勤勞侈學業之富麗則有咏歌之什在而非豫所能道送太學生徐細觀序豫以非才備員太學博士常旬考月試六館士第其髙下以砥礪激勸之在列者二三千人而東鄞徐生細觀以易經就業辨說隂陽變化之理甚有根據其才識見於䇿論中又善馳騁開闔有程度心喜之每取置前列去秋應試京闈果中式今年會試南宫又中副榜於例當得校官生曰吾年尚少未可以為人師願得復游成均以卒吾業未幾廷議亦以副榜中年二十五以下願復入學者聽生欣然歸就諸生列六館師友益賢之他日以例得省其先墓助教黃季端先生為徴豫言以贈之昔孔子使漆雕開仕開曰吾斯之未能信夫子嘗悅其篤志其視諸子之欲得國而治者或以干祿為學者相去逺矣夫鯤鯨有變化騰達之質必不棲身於沼沚鴻鵠存冲霄之志其肯局促於茅茨哉今生與天下之士羣居以肄其業出與天下之士角藝以見其所長自小夫曲士得之孰不喜形於外而揚溢於中哉顧乃慊焉若不足欿然而若虛此非自知之眀而不安於小成者不能也雖然卓爾之見工夫尤難一簣之功進止在我聖言在耳生歸而益求之自有所得焉豫言毋足為生道也送龔給事還鄉序人惟有卓立不移之志然後可以建事功垂聲譽以取異於人人茍隨俗浮沈與時髙下吾見其貿貿焉弊弊焉形拘氣役之不暇尚何能拔俗超常以致不朽哉昔年世俗不事讀書鄉里見有儒衣冠過者相與訕侮之或强委以案牘涉旬月則以事去人有子弟甘自棄於耕家以為得計之上同邑龔君叔安獨不然叔安居闤闠間能屏去紛華自束髮即出游邑庠人皆異之居數載領鄉薦入成均擢拜給事中叔安能以疏通特達之才濟之以問學於是名動縉紳間夫為學而承國家之樂育出仕而為天子之侍臣皆極天下之殊遇乃人之所願欲而不可以必得者也而叔安能兼得之非其志之卓然不移者能之耶人謂叔安蚤孤而其母夫人傅氏能秉節守義以教之故叔安之致位通顯皆奉慈訓之有自而非偶然而得幸然而致也今年叔安以母老請歸省詔許之戒行因徴余言以志别余念與叔安居同里閈聲迹始相侔後余以虛名所驅行四方不相聞者四五年今以非才承乏太學未幾又以薦者入史館朝退每相過從道舊故且期同謁告以展邱壠之誠余方以纂述事嚴未敢有請而叔安乃先我而去烏能已於言哉雖然當叔安歌鹿鳴而來鄉人固皆以事功聲譽期之今兹之回親戚故舊迎候于道左者豈不嘖嘖歎曰士君子立身不當如是邪其視夫甘隱淪老死於山林者所得不亦多乎於是其母夫人安節教子之功與叔安揚名顯親之道政蘇長公所謂持左劵而交手相付也孰謂為學而可不立志哉繼志齊集卷六
