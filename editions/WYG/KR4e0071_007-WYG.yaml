body:
  text: 記正學齋記漢中府教授天台方公希直備純眀之資負正大之學慨然有志於聖賢者也蜀王殿下素加禮敬間嘗聘置左右以諏咨正道公見必以仁義道徳之言陳於前王方大肆力於緝熈之學日以誠意正心躬修體驗為務與公論辨若律吕之諧肯綮之中無不吻合王愈加斂容納之與臣下言必曰方公今之賢者也遂賜名其讀書之齋曰正學期其底聖賢也公退以告於紳紳聞三代之隆大道昭著風俗淳厚人倫眀於上教化行於下故人之學焉者多出於正周衰列國紛爭人尚詭異各以智能自立門户而異端之術競起矣若揚墨之為我兼愛老􅅨莊列之虚無張儀蘇秦之縱横韓非申不害之刑名管仲晏嬰之事功有不能枚舉者逮至漢唐世愈降而道愈漓著書立言者動以百計其為説必曰我著書所以眀斯道也而道卒不加眀我立言所以開人心也而人心終不加古非徒無益於人其所以壅塞正途聾盲耳目者為甚大天下之士莫不隨波逐流而相上下其於聖賢之道遂若岐逕之異趨矣比之三代之學其邪正為何如哉尚幸間有豪傑之士出於其間足以囘人心破邪説挽頽波而振餘風然卒不能多見若漢之董仲舒其言眀白坦易為得聖賢之心唐之韓愈卓乎特立於百世之下皆間世之竒才也至宋周茂叔以洒落之懐得理奥於黙契心融之妙及其門者若二程子之主敬行恕窮神知化而道益宏逺矣其後新安朱子出又能推明周程之㫖而集羣賢之大成於是世之先後雖不同要皆羽翼斯道而所學純乎其正者也故自三代之下論者莫先於宋有元之時若許衡氏若吳澂氏若許謙氏輩彬彬和附于下者盖莫非朱子之傳嗚呼上下千數百年求其人僅僅如此而邪説之惑人返有過之則夫凌髙駕虚勵志鼓勇而跌足於異途者可勝道哉此志士仁人所為扼腕而深悲也今公才足以振俗徳足以服人生逢聖眀之世而又遭遇賢王之眷顧則所以追諸子而遡三代者公其可無意乎紳也志識卑淺於公之學無能為役幸嘗辱知於公最久故敢竊公之餘論以繹睿念之萬一茍以為然則繼今以往益圖執鞭以為御焉新建晏公廟記隂陽二氣屈伸聚散於穹壤者莫非至理之所寓而至化亦未始不行乎其間也日月之所以明雨露之所以潤雷霆之所以威霜雪之所以肅以至山川流峙鳥獸孳育草木榮悴無一不囿于其中况夫人身血氣之盛衰精神之完耗有不由之者乎此鬼神之道所以為二氣良能而理之固有者也夫何世之好竒而喜怪者見其眇昧非可以膚淺探賾往往附以妄誕之説鼓惑于人孰知其道固非言語所可盡者耶至乎因其迹而起敬慕之心感其誠而致孚格之妙此又理之自然也若平浪侯晏公之神其崇名重號顯于時異績冥勲在于人而廟貌之設遍布宇内者亦豈過情哉義烏縣西五里曰松門原隰平衍風氣固密而聚落亦殷盛嘗有挟堪輿之術者過謂其地雅宜神居適里人王仲言氏黙有契感遂相基掄材剏廟宇三楹間肖神像其中規度未完而卒仲言之季仲舉能承其志復直前搆重門周以崇垣樹以名木而鄉人又風承雲集各効其力故凡廟制之所宜有者無一不具起於洪武二十四年十二月庚申落成於二十八年二月戊寅既成苐見士民歳時相與扶耋攜㓜登拜歌呼其間絡繹不絶而晨香夕燈上以祝皇圖之萬年下以祈斯民之康泰者賢愚一志億兆同心於是此廟之設儼為其里之壯觀而神之報貺於逺近者亦昭昭不誣矣予維鬼神之道既為造化之用其所以孚於人者非可以智求非可以力得唯一念之誠足以感之耳今觀王氏兄弟之寅恭祗奉閭閈士民之嚴威趍事其精慮潜通雖衡山之雲可以開囘禄之勢可以轉况神之靈妙在冥漠者如水泉之行不擇地而有乎苐患人心靡終耳今因其請文為記故極論之庶使来者知所以焉若夫神之姓名里系顯靈在人心者類能言之兹不復述攬秀堂記予宦游於蜀見峨岷之山綿亘而聳拔挹其扶輿旁薄之氣常若有所資於心也又經巫峡之水衝激而鼓盪覩其囘滙奔趨之勢常若有所會於心也當其資會于中之時金石不足以喻其樂聲色不足以奪其志抑欝為之舒散精神為之暢越或發於文亦沈雄而壯麗以是知夫山川之秀其助於人者為不少也及謁告来歸過吳彦彰氏於烏傷江上彦彰闢堂以居前臨大江當春夏水生秋冬水落其揚瀾曳波之狀萬萬不同朝夕獻竒於几舄之下江外羣山厯厯如堆螺如列障四時榮悴與氣候相推遷者又呈媚於牕牖之間其後復有平原曠野極目彌望於十餘里外於是斯堂之勝其於山川之秀可攬而致也彦彰卜名於予予為扁曰攬秀夫自數十年以来聖人御世求賢如不及天下大夫士各負所有以思進用雖有竒絶之地其於遊覽之樂顧有所不暇也間有得之者多在鞍馬之間覊寓之中盖不過為慷慨激烈之資耳今彦彰既生遇於承平乃得倘徉於閒寂其樂盖有所獨得而非予敢知也予聞古人固有身居􅅵畝而存愛國之心者豈以地位為間哉彦彰尚能於樽爼之邉眺望之頃一跬歩一談笑舉手加額以不忘於化育之恩若此則彦彰雖老且疾予見其將以所攬之秀必於子若孫發之矣况山川之秀鍾而為人必瓌竒而俊傑者乎其視予之所得於前者盖不侔矣故書之以為記使彦彰知所自云施氏雙溪庵記剡溪之陽施氏世居焉施氏之先在宋有諱郁者為太學博士兼莊文館教授其從子南一亦以文學仕至括蒼守及有尚宗室女者三人今其裔孫有曰道圓字仲方以先塋皆在溪北去家五里而近不欲使祖父體魄散處乎遐逺也又奉其考畊隱處士及母傅氏兄恕齋處士之柩以附且自營夀蔵於其側既又嘆曰體魄有歸而神可無所棲乎乃直東構庵一區其屋為間計者若干於是妥神有亭祭獻有堂致齋有所肅賔有舍周以崇垣抗以髙門以至庖庫湢溷莫不完具外割腴田若干畝𨽻其入以為奠饗之需既成左春坊左庶子義門鄭公濟為篆其扁曰雙溪庵盖因其地名之也余自蜀歸過仲方之家仲方邀余至其庵且徴文為記予考諸禮古無墓祭其殆以既𦵏必制主而主者神之所依也有主必有廟故祭必於廟而墓者特體魄之所蔵也因畧而無文盖禮以義而制者也後世人子不忍死其親見手澤桑梓之存必悲感而愴慕况體魄之所在其有過而不哀思乎哀思之至肸蠁潜通之道也於是上墓有祭依墓有廬而庵制之設禮以情而起者也且禮者天理之節文也事合乎理而盡乎情此儒先君子所以弗之禁也歟惟仲方居今而志古處富而好禮其從子宗儒宗缺又皆恂恂雅飭克相其志故能急人之所不急尤世俗之所罕遇者也雖然仲方之志尚矣美矣尚賴賢子孫相與共守其傳可也夫欲使其遺緒勿墜而昭示於無窮者又非文不足以信此仲方所以為請而予特為書之使登斯庵者知其作興之意若夫雙溪之囘合八寳諸山之擁竒獻秀於左右者覽者當自得之故不復書善寳堂記凡有血氣者皆有嗜欲而嗜欲之深者其惟人乎人有嗜欲而志向不審於善惡之機其禍福所由分也惟仁人君子能超乎庸俗之表故所志自與庸俗異孰知庸俗之所志乃仁人君子所深悼者也試嘗語於人曰珠玉錦繡無用於世者也唯道徳仁義古今之共寳日用之不可缺者彼必呀然詆笑以為愚噫是豈真愚者哉其所志不同也昔石季倫富擬封君窮奢極侈以恣其欲及身辱家僨始悟為財所累龎徳公恬於勢位躬畊壠畝獨能遺子孫以安二者之志向其禍福為何如哉剡溪之上有傅氏傅氏之秀有叔友與其從子士眀士儀士信皆和易謹飭入以孝悌修于家出以行義聞于鄉盖一鄉之善士也一日相與言曰天道無親以善為親易曰積善之家必有餘慶是則善者固人之大寳也况人稟二氣以生即賦之以徤順五常之性固無不善者也及乎情欲熾而天理微於是向之所云者如牛山之木戕伐於牛羊斧斤者非一端而所存無㡬矣每見世人如浮漚起滅者何限皆由不知以善為寳而敗厥良彛也且吾家自顯考剡溪府君治業􅅵畝不務外慕有龐公之徳孜孜為善不竒貨利無季倫之僣政傳所謂楚國無以為寳惟善以為寳者乎今以其遺我後人者可考而不誣故吾等得以安享之也今吾等茍能繼承先志則異日子孫又豈不吾若哉是則善寶者得非吾家相傳之心法歟遂謀以善寳名其堂且来徴文為記予既嘆夫人之嗜欲為禍福之機顧其志向何如耳今叔友子姪為能審於此惟先志是承吾見其父作子述代續世傳而餘慶之流綿綿曷既乎董子有言積善在身如日加長亦其意也敢贅誦闕一樂既為人所願慕而不可必得者今紀常獨能得之宜其忻忻然見於色諄諄然發於言而堂名所由命也雖然出於天者衆不能皆得而吾能得之是天已厚於我也其出於已者吾可不盡心力以致之哉此又孟子所謂仰不愧於天俯不怍於人二樂也二樂既得則徳成業廣而英睿之才將自逺来求教於我故我之道得以傳之者衆而澤及其逺矣此又孟子所謂得天下英才而教育之三樂也嗟乎樂之出於天者不間賢愚貴賤或有幸而得其出於已者自非大賢亞聖之上安足以盡之哉已既不盡尚何教育之及人哉故予謂得二樂而一樂愈増其榮盡二樂而三樂不謀自至矣今觀紀常誠慤謹厚氣質凝重孜孜於道庶有志於自治之功者其徳業之成固將遂顯揚之志而併得所謂全樂矣是豈庸人之所謂可幸而得之者况居教養之職哉若紳也失怙恃於襁褓且惸惸焉無兄弟之可依其不得於天者甚矣然猶勉焉不敢以自棄盖有求於已也今因紀常之屬故要夫二樂三樂之説以勦言之嗚呼得于天者既不同而求於已者庶期相與䇿勵切磨以底于萬一此紳之志也又豈非紀常之志哉尚志齋記吾友李子尚氏造予而言曰向者嘗辱子為繹夫製字之義則既知夫自勵矣吾聞君子之成徳也必有齋居以為脩養之所今幸闢一室可容俯仰而未有名之以為警者子曷終恵之予遂因其字而要夫孟子之文扁之為尚志且復為言以畢其説曰甚矣士之不可不尚闕而辱淬勵者至矣今將去左右而違離也願名其游息之齋且求一言書諸紳以終佩之予䀌然憐而嘉之遂為扁曰勿欺復為言曰天下之事善惡皆原於心而發於意意之所之非誠則偽而君子小人之所由分也妖艶之色都治之容連城之璧照乗之珠小人之所嗜悦者也當其嗜悦之時禮義不足以制其心法律不足以禁其欲金石不足以方其堅者其心之所好者誠也若夫仁義禮智之根於心忠君親上之發於志者此至善之所止而君子之所嗜悦者也然而往往不能真修而篤好之者以其好之之心不誠也茍能以其好善之心而易其好色好貨之志則無伏匿閉蔵之患而有暗室不欺之功矣心既不欺於是以之事君則有蹇諤匪躬之節而無阿媚茍容之態矣以之事親則有服勞奉養之忱而無倨傲違戾之失矣以之臨民則有惻隠愷悌之實而無刻暴厲忍之過矣今夫三尺之法兒童走卒之所曉也而蹈之不絶者以其欺於心也五者之達道愚夫愚婦之所知然而卒不能行之者亦以欺於心也嗚呼天下之人同此心也賢愚之心同此理也然而卒有霄淵之隔則夫君子之成已成物者其可少欺其心乎昔衛武公年九十而作抑且曰相在爾室尚不愧於屋漏司馬温公平生致君澤民之功皆本於誠實不欺而已今顯也行將推其所學以用於時去其小人嗜悦之誠而力夫君子好善之誠如武公之不愧屋漏可也如温公之本於誠實可也若是則無負於予言矣雖然豈特不負於予哉將見因予言而成顯之徳者自勿欺始矣存齋記穹壤之間顱圓趾方飢食而渇飲夏葛而冬裘者莫非人也然有能贊天地之化育彌綸天下之大務者有智不足以周于一身徳不足以成夫一善而自夷於萬物者非其命于天者不侔顧其心之所存何如耳伊尹之心存於致君澤民周公存於興禮樂開太平之基孔子道不行于時而後存于埀訓顔子身居困約而存於為邦孟子閔時之衰而存於行王道彼三聖二賢者其功著于當時其徳垂于後世所謂君子存之也戰國以来管商之存於事功申韓之存於刑名蘇張之存於縱横鬼谷子之存於捭闔楊朱之存於為我墨子之存於兼愛老子之存於虚無佛氏之存於寂滅雖其所存之不同然其悖理而為弊也甚矣且均為存也存其大者逺者為聖為賢存其小者偏者為異端之道則夫君子固不可以不存而存之又不可以不審也四川僉憲毘陵王公博學而有文㢘敏而多識嘗名其齋曰存齋人於以知公之處心為有素矣夫事㡬經於前懵然不知其所措義利紛乎内茫然不知其所從者皆由其心素無所存而役于外物也今公居重位僉憲事國家之耳目寄焉生民之休戚係焉而能歉然於所存予意夫公雞鳴而起未與物接所存於心者公忠以奉乎上仁恕以接乎下及平旦而行無非向之所存存之既正行之益精如庖丁之於牛宜僚之於丸盧扁之於醫逢蒙之於射不待謀猷忖度而心領神會矣其視異端之説如髙下黒白之懸隔尚何足介其中哉公嘗屬筆於予故要諸聖賢之道質於公公茍謂然則蜀民之被其澤者益博矣因請書之以為記忠孝堂記予讀唐史見栁公綽家子孫昌盛至十餘葉不衰未嘗不嘆天之獨厚之也及考其由乃其家法嚴毅所以防範其子弟者甚至在家則孝於親出仕則忠於君忠孝兩盡百行皆全於是父以是令其子子以是教其孫代續世傳耳濡目染莫非此道始知天之所以厚之者非私也其視房杜輩門户為何如哉嗚呼栁氏已矣吾不得而見之矣以予所觀播之宣慰庸齋楊公殆有過而無不及者焉楊氏自唐太師端受僖宗命来為防禦使立功著效夷民畏服因世保此土逮公凡十有九世矣自唐迄今五百餘年雖世代屢革而楊氏推忠効績灼灼可紀入國朝率先奉版啚来歸歳時獻貢方物尤盡忠順之禮皇上嘉之凡所以褒崇而賚予之者尤厚人知楊氏之澤有引而弗替不知其所以致之者有自也予自曩歳獲登其忠孝之堂因仰而嘆曰夫物必有以培之則其發也益茂必有導之則其流也益衍此理之自然非有待於燭照龜卜而後見也今觀公上承朝命下綏部民而享有福祉者以有忠孝為之本源而其父祖若孫培之導之者繼繼繩繩而不絶也此予所謂揆之栁氏有過而無不及者夫豈媿辭也哉雖然韓子有言莫為之前雖美而弗彰莫為之後雖盛而弗傳吾願楊氏之子子孫孫凡升是堂者皆以公之心為心則其福澤之来庸有極乎觀瀾亭記君子之為學所貴乎知要而尤在乎體騐盖不知要則無以得其道之本原不體騐則無以有諸已是以天地萬物森列于上下分而言之固皆為吾身之對合而言之雖動植流峙之微莫非吾心分内之事今夫亭毒之間物之最著者莫如五行而五行之中為聖賢所亟稱者尤在於水故孔子論道之源則曰逝者如斯夫不舍晝夜孟子論道之有本則曰觀水有術必觀其瀾説者謂瀾為湍急之處盖惟流動不息者有之至於涔蹄之間杯杓之内沼沚淵澤之中則無之矣惟其来之有源行之不止而瀾見焉故善觀水者必於此而知其有本者也夫衆人徒見鳶之飛魚之躍山川之融結草木之榮悴以至父子之親君臣之義夫婦之别長㓜之序朋友之信而不知道之所以然者皆原於天而備於我須臾不可離者也惟能知其出之有本則凡所以反諸身者無不誠矣至哉孟子之論得其㫖者可以知學之要驗諸體者可以資其成徳非善學者其孰能之四川僉憲毗陵王公某名其燕休之亭曰觀瀾它日徴言於予以為記惟公沈酣於六經厭飫於百氏其論説章句也如獨繭運絲綿綿乎有其緒其辨折義理也毫分縷析不遺以錙銖其學可謂有本矣今復以此寓其志者豈直為游觀娛玩之具哉盖觸之於目則必以體驗之庶真知萬物之備於我者皆有其本而舉不外於吾也其視生民之休戚刑政之治否宜若有不得辭其責者矣豈直為游觀娛玩之具哉予故樂推其志之所存以為記用拙齋記四川僉憲鳯翔張公子麒扁其退食之齋曰用拙或者疑之曰夫㕘憲綱典刑獄下以振一道之風紀上以寄國家之耳目其任莫重焉居其職者是宜牢籠事物聰察毫眇捭闔智謀縱横慧巧庶㡬政得其序而刑得其平茍徒拙之是用吾見其枉者失乎理而訟者隱其情焉公聞之掀髯而起囅然而笑曰咄咄子来前子徒欲吾騁其私智而不知大道之本於自然也子徒欲吾行其小巧而不知夫拙者之全其天也往者洪荒之世風氣渾厖人無機巧恪守典常是以無飲食也則茹毛而飲血無宫室也則穴居而巢處無罍爵也則汙尊而抔飲無音樂也則蕢桴而土皷其為拙孰大焉後世淳風稍變制作日興為之甘腴鮮美以致其養為之雕題刻桷以華其宅為之籩䇺簠簋以極其奉為之五音六律以成其樂於是向之所謂拙者漸變而為巧矣暨乎近世去古彌逺澆漓益作奸偽紛紜是非交錯有不可枚舉者是故俳儷纎浮抽黄衒白擷藻摛葩於道無益者此文之變乎巧也出入四寸曲學旁門博采雜出於道無聞者此學之變乎巧也與時俯仰闕以介意而奉之如舉百斛惟能如此於是近之可以治已逺之可以治人大之可以用於天下國家小之可以為天下國家之用雖以堯舜禹湯文武心法之相傳亦不過乎此况士君子之慕聖希賢而致用於世者乎四川憲使李公文敏署其宴處之軒曰敬間來徴余文以記之夫敬固未易言也自孔孟以来至宋諸大儒論之者備矣余無容贅辭矣姑以公之日用所接者言之坐乎訟庭之上而辨彼此之曲直一見之明寃者得以伸枉者得以理一念之失則善者被其害而惡者肆其奸於是時也公之心肅乎若上帝之是臨昭乎若神明之是監戚乎若恫瘝之在體惕乎若已不得辭其責者則其為敬也大而斯民被其澤者衆矣茍以宦業之成為已足民心之休戚非所慮察情或慢於兩造之備聽獄或忽於五過之疵似此則曠厥職矣今公以聰敏之才濟誠篤之志由太學生而為名御史由御史而陞兹職厯任三載政績灼灼兹復存心於敬可謂得為政之要矣予聞舜之戒理官曰欽哉欽哉惟刑之恤哉穆王之制吕刑亦曰敬之哉是聽訟決獄尤當以敬為主也而公能致意於此余故樂為之記既以勉其志之成且以為蜀民賀滇南慟哭記先公以洪武五年正月奉使雲南招諭元梁王六月抵其境六年遇害至二十五年不肖孤紳竊禄西川屢請於蜀王殿下二十八年冬得㫖十二月朔日戒行次年二月二十三日到滇次日㕘見岷府退謁藩閫文武大臣及土人士友並以情事為告聞者閔之競為咨訪二十五日有􅈎人畫工何仁可年七十餘来言親炙先公於佑聖宫甚久至繪素之事亦多經指授且云初来時梁王甚加禮敬府僚大臣若司徒達爾瑪㕘政喻金閭髙撫慰輩尤所尊重凡見梁王必以天命所歸人心所屬之理為之開説退諭其臣僚尤加委曲梁之君臣亦知元社已屋皆有降意時元之蘖主逋逃朔漠者遣侍郎托克托自西蕃来通耗索援且刼以危言必欲殺我使以固梁王意梁王不忍遽絶於我朝廼匿先公於民間托克托聞之誚曰國家顛覆而不能救反欲逺附他人邪躍馬而起梁王不得已遂出先公以見之托克托欲加屈辱先公慷慨罵曰天訖汝元命我朝實代之汝如爝火餘燼尚欲假息以與日月爭光邪我將命逺来豈為汝屈今惟有死而已或解曰兩國交爭不罪来使不從則遣之彼何罪焉况王公才器天下無雙宜有以全之而托克托曰今日雖孔子在義不可留梁王不能救先公復顧梁王謂曰汝朝殺我大兵夕至矣亦不聽遂遇害時為臘月二十四日未申時盖􅈎人以此日為節日故久不忘也諱日城中父老士女莫不垂淚達爾瑪既陳奠祭左右具衣冠殮之以禮即日舁至地蔵寺北漏澤園化之以火諱所則今之觀音寺前三市街言訖引至漏澤園擗踊設奠是夕宿地蔵寺自此連日至彼展哀至二十七日紳别訪南關董金剛保以合其説盖以先公嘗主其家故也金剛保亦引至觀音寺前指以諱所號慟間市人競来致問中有蘇努者前言棺木實其家所備盖其兄慶時為元帥故達爾瑪一以後事委之其言遺事略與仁可同但奴則云火化在小南門城濠邉復引至厯指其處哀未止有僧從西来自云年百歳口述遺事甚悉紳拱問化後遺殖何在僧言彼時上下恟懼誰復道及此者三人之言遺殖並同自是士民僧道多来稱述先公容貌言行嗜好製作動靜僕從皆可稽但無能知夫𦵏所者因姑設次為位於地蔵寺之東夹室越明日漏四下陳設於寺門外告祭於雲南府城隍里社寺伽藍等神備述情事之由禮畢奉新製木主就觀音寺前諱所盡哀題主禮畢迎囘地蔵寺位次昧爽行正祭禮先是布政張公紞㕘議范公祖嘗訪先公節行於臨安儒士賈寛寛達爾瑪門客也故獲侍先公最宻因言曽有詩見寄可考暨紳至張公即命迎寛三月十日寛至所言與前頗同乃云化後達爾瑪已使𦵏於地蔵寺之旁後十許日寛往哭之止見平土而不結丘壠自國兵来陵谷變遷已不可認迄今犁鋤薦臻屋廬相望想像亦不能得其彷彿也寛又云先公前館于報國寺後因托克托至遂移館于春登楊氏家平日杜門不接人事惟讀書著述有文集二大冊達爾瑪録本蔵于家後併原槀不知何在寛年髙質重所言似非虚妄者又沅士鎦有年近見宜梁民李鉉鉉自言其父起宗為元樞密院都事好士而知書曽延先公于家甚久後事皆其經理今墓所惟鉉知之有年前任沅庠時常接見先公故聞之甚留意越半月紳至滇有年即来告且為書招鉉十一日鉉至口述遺事亦悉又舉先公題其竹軒三絶句遂導至兀兒朶東門外之百步指羣塚千百而言曰大畧記在此處而羣塚盡遭發掘無遺者紳見其年少不敢盡信又見頗能記憶亦不敢不信遂於其處仰天大慟次日於羣塚旁擇曠地仍設次為位迎神主陳祭祭畢復奉歸寺之元次越十日奉神主而迴嗚呼哀哉紳之初志鋭欲訪求遺殖歸𦵏先隴以襄大事不幸歳久事殊以至此極雖粉身碎骨亦不足以贖其辜他日尚何面目見先公於九原者哉擗踊之餘因忍死備記于簡以誌不忘終天之恨且使後世子孫有以知其荼毒嗚呼痛哉繼志齋集巻七
