body:
  text: 繼志齋集卷八明王紳撰記寒谷小隱記義烏縣南五十里有山曰大寒原谷深邃岩壑峻絶田疇衍沃而草木蓊密其地逺城市其俗敦信義故士之厭喧囂而嗜幽寂者莫不樂處之邑人進德陳先生自元末之亂避地來居結屋數楹間扁其顔曰寒谷小隱於是居其間角巾杖藜日徊徉於山巔水澨或同父老酌春酒話桑麻或挾册攜琴坐泉石間至暮始返處而樂之若將終身焉逮乎大眀啓運詔求遺逸有司以先生應命先生遂幡然而起至則授以錢塘儒學教諭錢塘古東南都會居民富庶習俗工巧先生至一以仁義道德躬修實踐之學以為教未十年子弟之承學用世者往往為時名公卿其居錢塘初無赫赫之譽而清名隱然動於搢紳間凡朝廷往來之使四方碩彥之士至者莫不願見先生先生處已愈謙待人愈厚雖居繁縟之邦而心往往在於窮山密林也每謂人曰吾之居所謂寒谷者果逺邪近邪吾不得而知也以為果逺邪則林姿谷態之蒼茫冬夏朝暮之異狀未嘗不往來於心也以為果近邪則山川數百里之遼邈職事官守之羈縻而足迹未嘗得數數到也於是命工繪為圖名公巨卿又為詩文以紀之先生復徴言于紳紳之先世居鳯林去寒谷不數里始祖節度府君愛其山水之秀自會稽來遷迄今三四百年族日以大重圭疊組代不乏人世號鳯林王氏今先生藴才積德未及大施而年已老安知異日不遺澤委祉而儷美於吾王氏乎抑聞寒者冬之令也萬物遇其時則必損伏屈抑以自存今先生隱處寒谷而出居冷官適符先生之心迹矣紳固守寒賤處荒涼而逺炎熱者有素今一旦泝濤江泛湘漢上瞿峽抵巴蜀計其道途不啻萬里回想故山故水豈能忘情是先生今日之為心固紳之所為心也其能已於言乎文以記之其亦發豫心之感慨爾三教堂記道士某君某通儒而旁習乎佛氏之法於所居闢堂三楹間乃肖孔子釋迦老子之像合而祠之因名曰三教堂爰使來取記豫惟三教之道若岐徑之異趨氷炭之不相入蓋不可同日而語者也是故儒者以誠意正心修身齊家治國平天下為本而佛氏則以守空寂滅明心見性為事道家則以清靜無為鍊形長生為主要其歸清靜無為則當株守塊處莫能事事明心見性則當死灰其心朽木其身嗚呼使天下之人皆習二者之學則穀粟布帛無所出而五倫五常亦幾泯矣必若吾儒之道行之萬世而無弊用之須臾不可離者為可尚也故世之知本者是宜以孔子家祠而户祭之今乃慢不加省幸賴前代遺制尚存而郡縣之設未墜然而佛老之宫則乃遍布鄉閭星羅棋列不可悉數其故何哉夫孔子之道眀白坦易正大光輝非有竒譎詭偽以衒人而佛老者伸舌啓口則惟以虛無眇昧之言禍福災異之故以警世此世之所以忽常而好怪慢逺而趨近亦其勢也雖然吾孔子之道譬猶日星之在天山川之在地不以人之好惡世之崇尚為增榮又豈以淫詞瀆禮為合義哉此吾儒所以縱而不暇論纍世由之而不察也今君既為老子之學而旁求佛氏之旨又能習知儒道尊慕而合祠之嗟乎世之為三教之學者入乎此者出乎彼若秦肥之視越瘠固未有相得者也惟君乃兼通而並嚮之故是祠之建雖未必允合古誼要知其繫人心崇教本所厲於風俗者為不淺也其視夫泥於一端局於一器者不其多乎豫故樂書以為記尚友齋記君子之自待也重而自視也髙則庸俗不足以厭其意庸俗不足以厭其意必求古之賢哲之士與已志相符者而友之杜子美處流離困厄之中而自比稷契胡康侯愛諸葛孔明之為人蘇明允為文必取法於孟子子瞻之心迹效白樂天雖其所就有不齊觀其自待自視者如此其能局於淺近而自狹耶國子助教廬陵鄒君仲熙名其居齋曰尚友鄒君以豫辱交也厚徴言以記之豫嘗與之縱談千古之故而商略當今之宜稔其為人矣又安敢以不敏為辭夫鄒君生文獻之邦而負超越之才勵志古學凡古文辭有當意者悉手自抄録口誦心維志忘寢食涵蓄既久發而為文益凌厲贍足然酷愛南豐曽氏之作觀其音韻步驟間亦似之况其年甚富而志甚鋭則其自待之重自視之髙而庸俗不足以厭其意者宜也雖然豫切為去古既逺士習益卑固有志者之不屑就至於凌髙騖逺不求其實而惟虛名之是慕者又豈非君子之所病哉必有子美康侯明允子瞻之志而後可此又豫與鄒君所宜共勉者也且昔鄒君佐教於一邑已友一鄉之善士矣今之居太學是友天下之善士也鄒君尚毋以天下之士為皆不足友也茍以此待天下之士安知天下士不以此為待哉豫又聞古有求千里馬不得購其骨而馬自至者蓋亦示所好於人也鄒君於此盡心焉而後馳思於往古雖欲肩顔孟而友伊周人不以為過矣鄒君以為何如樂親堂記人之大倫有五而莫親於親亦莫尊於親也惟其親而尊也所以思致之於安且夀者無所不用其極焉固如金石矣而猶患其有時而消泐夀如喬松矣而猶慮其有時而終窮况於晨夕興居之間寧不思致其養哉夫甘旨以充其所嗜滫瀡以中其所欲其於口腹之養至矣君子不謂至也輕暖以適其宜晏安以適其體其於四肢之養至矣而君子亦不謂至也夫為養而捨此固不可使務此而心有所不悅志有所不遂雖日奉以三牲吾知其不以為樂而反以為戚矣故孔子曰養則致其樂而孟軻氏亦謂不順乎親不可以為子是則為養之道孰有加於樂哉廬陵胡原旦氏名其養親之堂曰樂親他日走京師介其友李子學來徴豫言以記之豫惟欲樂其親者人子之同情也然而事有不齊則其志有所不遂力足以為養矣而父母之年或不待幸而父母具慶矣或梏於困窮或厄於暌離又幸而無此矣其或反身有不誠制行有不謹尤足以貽其親之憂焉之數者或命於天或由乎我命於天者非力所能為厄於我者可不思致其意哉余聞元旦讀書知義理又喜交賢大夫士今觀其名堂之義可以知其為人矣豫也自晬離先公於膝下及弱冠先公執節於蠻荒先母亦感憂而卒今幸叨忝祿位欲致升斗之養而不可得况望致其樂乎因元旦之請益不自勝故書余與原旦之不齊者以為告使原旦知命于天者不易得而不忘乎喜懼在我者之不可不盡而夙夜常存於警省也橘軒記尚論東南之名木冬夏常榮而蒼翠可以悅人心目者惟松柏楩楠豫樟為然然而無實可以充人之食果之可以充人之食者有梨榴棗柿栗李而其花葉應時而發隨候而雕不足以聳人之觀瞻求夫二者之兼至其惟橘乎今夫層枝剡棘緑葉素榮鬱然不變於寒暑者吾知其為橘也青黃雜揉文章燦然於天地嚴肅之時者吾知其為橘也以言其味則甘而馨以言其功則可充錫貢而療疾病是以古仙叟隱其間以自樂屈大夫頌之以自况者良有以哉鳥傷丹溪之上有隱君子曰楊君伯融好古知學有才而篤於行鄉人稱之其事乃考彥德處士尤盡愛敬之道嘗扁其奉親之軒曰橘軒蓋以環室所植者皆橘也於是處士甫方以耆年碩德享有天爵之貴子孫宗戚歲時問候稱夀於橘軒者肩相摩而足相踵處士甫童顔鶴髮角巾布服據中坐為之談倫理言仁義斥異端似是之非而參之以當世之務亹亹不能休及退而瞻橘林之蓊密味橘實之甘馨未嘗不歎伯融之善娛其親而羡處士甫之德深契於橘也繼而處士甫化去幾二十年伯融追慕之心益切覩橘而傷手澤之尚存入室而慨聲容之如在慮無以慰其思於是走書京師求為之記豫家青巖去丹溪僅一舍向間居時常杜門不出故弗獲接其面顔今也祿食于外幸盡友天下之賢而鄉邦善士如吾處士甫者乃獨不之識每以為恨况今與伯融聨葭莩之好而復以此為屬寧不喜聞而樂道之哉詩曰維桑與梓必恭敬止又曰髙山仰止景行行止伯融尚益思培其根埴其本使其枝益茂而實益繁庶乎遺蔭流芳于後嗣者彌久而彌昌也易曰碩果不食君子得輿余實有望於楊氏矣養齋記自古名世之士其才器皆養於未用之先而功業成於既用之後譬猶千尋之木必蓄於山林曠莽霜雪雨露之中而後可以任棟梁之用豈若樲棘榿樗之怒長驟發而不中於繩墨哉張良之智養於圯上韓信之勇養於胯下諸葛亮之勳烈養於隆中是數君子者之志慮器識皆培埴深厚故其出而應事也若庖丁之治牛迎刃而解矣鳥傷蔣君伯原讀書華川上為人沈毅端慤氣和而貌恭家世業醫至伯原而得丹溪朱先生再傳之妙故其術尤精鄉閭之抱疾無訴者必賴伯原以為安伯原之惠利及人既多其心猶不以為足復扁居室曰養齋其志蓋不安於小成而欲養之以就夫大器者歟他日馳書京師求余記夫世之小丈夫者挾偏曲之術濟滿盈之志幸其偶中一勝以為能旦旦而揣之曰吾術足以行世矣及嬰之以槃錯被之以紛綸未有不顛倒是非變眩黑白而僨事貽笑者皆素無所養故也今伯原固足以有為而猶存於養吾知其所謂養者非特欲以自養蓋志於養人者歟風寒暑濕之賊人養之刀圭以致和平疾痛痼滯之害體養之砭焫以致康復人之蒙其養者既衆則已之養者益厚養之既厚於是出而醫國則一國之人蒙其養矣此伯原之所以為志而欲上效數君子之善養者歟余家與伯原同里閈自總角相遊戲稍長伯原遂任家學之傳而余貿貿焉罔知所立未幾亦為虛名所牽西入蜀又以情事未伸南上滇道途奔突神疫形瘵今復以非才召人為國子師夫以衰朽之資又無所養之素一旦幸而居厚秩任重事愧莫甚焉其視伯原之久養於家林者不可同日而語矣庶幾他時謁告來歸一造養齋之下伯原尚能閉關下榻焚香瀹茗為余劇談養之之妙而使余亦有所得乎姑書豫説以諗之容齋記天下之物不患其不聚患乎其聚而不能容江河川澤之水非湖海以納之則必泛濫橫流而無所制合勺升斗之纍非鐘鼎以受之則必充溢委露而無所安是故覆簣土於平原增一毛於九牛之背非惟人不之覺抑亦不足為其多少矣况夫人之賦形於兩間見乎外者七尺之軀耳存諸中者方寸之心耳七尺之軀固不足以任天下之重然而方寸之心其體宏其量大虛靈微妙則有以周天下之事而無乎不容矣人固有授之以軒冕而不以為喜豫之以萬金而不以為意加之以頓挫屈辱而不以為戚其心休休焉汪汪焉若千頃波者其量為何如哉余從弟仲宗卜居於松門復搆小室為退休之所間嘗走書京師求闕養吾身才德於崇奧宗表既皆涵泳而浹洽於心或時瞑目危坐沈思默契於千古聞松風泠泠有金聲玉振之遺韻恍然似有得其旨趣者於是攝衣而起登眺以發其精神嘯歌吟咏以暢其情性或仰卧苔石看晴雪墮松頂或眄浮雲往來岩岫間則其心乂悠然于萬化之表日就月將而宗表之學忽不自知其進矣遂扁曰松間讀書處繼而郡大夫聞之選入郡庠為弟子員未幾領鄉貢會試春闈中副榜行將致用於世矣其心猶不釋過豫橋門請曰此某幼學之所願先生記之以示不忘其初豫聞而嘆曰宗表可謂善於為學者矣昔諸葛武侯嘗謂才須學也而非靜無以成學今宗表惟能由此以致其學則其所得者可知宜乎拳拳于懷而不釋也故豫為之書安節軒記余嘗觀夫草木矣當春夏之沾濡莫不敷榮而競秀及秋冬至而霜雪零也凡姿性之柔脆者皆望候而毁落惟松惟柏乃獨翹立於雕卉之端拔出於衆芳之表蒼姿翠色不可狎豈衆卉之可較哉嗚呼豈特草木人亦猶爾是故人具五常之性平居而樂處也曷有淑慝之别哉及事有不齊或摧挫而頓劈或鰥寡而顛沛處乎人所不堪而能不詭隨阿縱敗度斁常者其為安守節操者矣雖然安守節操固君子之常事而世降風漓民知其理者什不三四茍欲求婦人之知此於三四之中僅得其一焉若烏傷龔母傅氏其什一者矣傅氏年二十九而夫亡二子尚在襁褓乃誓死靡他對影寢食挑燈績絍保持門户鞠育二子者十六年如一日又能教其長子叔安遊邑庠士大夫以是尤多之叔安請名其奉母之軒於鄉先生養素俞公名之曰安節表之也叔安又請記於余余謂今天子在上宵衣旰食勵精求治聖慮所注而風教居首焉若旌善亭之設大誥三編之頌奬善懲惡者亦至矣惜乎人民之愚莫能仰承聖訓故能登名載德於二者何不多見也雖然亦有砥節礪行窮居獨處而名不揚者亦有之矣若龔母之不獲登名旌善亦有司之闕典歟豈天典民彜之全泯也豫故書而記之所以備有司之采搜且以表其歲寒之節耳是則兹軒之名其亦旌善之遺意焉為人婦者茍能慕效而思齊之則又為比屋可封之權輿者矣寧夀堂記斫木以為輪不越時而摧敗制非不完也冶鐵以為耜厯歲而毁折質非不堅也其所以然者以任之勞而處之不得其寧也今夫華嶽之山屹立天表厯千萬世而不見其崩九層之臺穹乎其髙撼之以風雨蠧之以蟻封而不憂其圮者以其靜而寧也君子之欲致其親於期頥者可不思有以寧之乎夫安其寢處以寧其外養其心志以寧其內內外一於寧而夀考可必矣浙江布政司左參政武昌周侯仲方名其奉母之堂曰寧夀豫僚友國子助教四明黃君季端采徴文以記之豫謂欲夀其親者貴賤之所同然而致其寧者則有不侔矣愚民之父母所憂其子者飢寒所營者衣食使獲十金之藏則志盈意得以其器小而易滿也閭右之家則不然所念者富貴所求者兼併偶一缺先兄仲言像贊春日其容秋水其目皎皎風姿碧梧翠竹惜其不為丹鳯之鳴朝陽而乃甘效白駒之在空谷也針却兼味針昔范文正公至晚必思平日所為事與所奉者直則瞑目鼾睡或有不及必竟夕踧踖不寧其自持之功若此故能成其德業心切慕之而未能效也且慮歲月迅邁志氣無成而悔尤日益以至故凡於食頃遇兼味務峻却之此雖非古人之所用心亦庶乎節忍之一端云爾因針以自警人身之奉惟適於中侈約得宜何儉何豐萬錢下筯三韭自給於已無禆於道無益行或不臧與物無異取物以奉是食其類宜受其養矯情飾愆棄禮弗居是曰逆天我心思之彼此交愧志業未就奚補於世念兹遺體弗養或傷養而失中天必我殃故凡食頃却其兼味以節吾欲以安吾義且懼志懈厥德不凝庸述斯針以為心銘上蜀府四針并序紳叨承國家洪恩厚澤久處輦轂之下仰知殿下天資智睿英敏而好學喜不自勝常欲取古人為學之要萃為一詩以塵經筵之覽而才力淺短有志莫遂今者適以虛名上達屬當逺行自揆葵藿之誠不揣芻蕘之語著為志學明德處謙崇儉四針繕寫以進伏惟海容川納而賜覽焉雖然語意不倫庶幾拳拳之情有以見矣臨楮無任悚息之至繼志齋集卷八
